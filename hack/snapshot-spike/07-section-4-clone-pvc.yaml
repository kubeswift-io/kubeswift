apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: spike-clone-40g-from-snap
  namespace: default
  labels:
    swift.kubeswift.io/spike: phase-0
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi
  dataSource:
    apiGroup: snapshot.storage.k8s.io
    kind: VolumeSnapshot
    name: spike-source-snap
