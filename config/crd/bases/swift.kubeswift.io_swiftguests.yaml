                      UID of the referent.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#uids
                    type: string
                type: object
                x-kubernetes-map-type: atomic
              restartCount:
                format: int32
                type: integer
              runtime:
                description: GuestRuntimeStatus holds runtime process information.
                properties:
                  hypervisor:
