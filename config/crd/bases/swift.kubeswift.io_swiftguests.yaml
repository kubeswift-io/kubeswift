                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              console:
                description: GuestConsoleStatus holds console access information.
                properties:
                  serialSocket:
                    type: string
                type: object
              gpu:
                description: |-
                  GPU contains GPU allocation and runtime status.
                  Populated when spec.gpuProfileRef is set.
                properties:
                  devices:
                    description: Devices lists the PCI addresses of allocated GPUs
                      (e.g. "0000:41:00.0").
                    items:
                      type: string
                    type: array
                  hypervisor:
                    description: Hypervisor is the resolved hypervisor for this guest
                      ("cloud-hypervisor" or "qemu").
                    type: string
                  nodeName:
                    description: NodeName is the Kubernetes node where GPUs were allocated.
                    type: string
                  numaNodes:
                    description: NUMANodes lists the NUMA node IDs the allocated GPUs
                      are attached to.
                    items:
                      type: integer
                    type: array
                  partitionId:
                    description: |-
                      PartitionID is the Fabric Manager partition ID for shared NVSwitch mode.
                      -1 means no partition (isolated or full passthrough mode).
                    type: integer
                type: object
              lastRestartTime:
                format: date-time
                type: string
              network:
                description: GuestNetworkStatus holds discovered guest network information.
                properties:
                  interface:
                    type: string
                  interfaces:
                    items:
                      description: GuestNetworkInterface represents a single network
                        interface with its IP.
                      properties:
                        ip:
