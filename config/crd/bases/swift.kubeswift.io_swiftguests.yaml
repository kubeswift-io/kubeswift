                  pid:
                    format: int64
                    type: integer
                type: object
              storage:
                description: |-
                  Storage echoes the resolved storage spec actually used for
                  controller-created PVCs (today: the root-disk clone). Informational
                  only — useful for kubectl describe and operator debugging to confirm
                  the per-field merge resolved the way the operator expected.

                  liveMigrationCapable is intentionally NOT a field here; see
                  ResolvedStorageStatus's doc comment for the write-back-race
                  rationale. Use IsLiveMigrationCapable on the resolved spec.
                properties:
                  accessMode:
                    description: |-
                      AccessMode is the resolved PVC accessMode actually used for
                      controller-created PVCs.
                    type: string
                  storageClassName:
                    description: |-
                      StorageClassName is the resolved StorageClass actually used. Empty
                      when resolution fell through to the source-image-class default.
                    type: string
                  volumeMode:
                    description: |-
                      VolumeMode is the resolved PVC volumeMode actually used for
                      controller-created PVCs.
                    type: string
                type: object
            type: object
        type: object
