---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: swiftsandboxpools.sandbox.kubeswift.io
spec:
  group: sandbox.kubeswift.io
  names:
    kind: SwiftSandboxPool
    listKind: SwiftSandboxPoolList
    plural: swiftsandboxpools
    shortNames:
    - sboxpool
    singular: swiftsandboxpool
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.image
      name: Image
      type: string
    - jsonPath: .spec.minWarm
      name: MinWarm
      type: integer
    - jsonPath: .status.warmReplicas
      name: Warm
      type: integer
    - jsonPath: .status.claimedReplicas
      name: Claimed
      type: integer
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          SwiftSandboxPool maintains a warm buffer of pre-booted sandbox microVMs for
          sub-second SwiftSandbox checkout. See docs/sandbox/overview.md.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              SwiftSandboxPoolSpec defines a warm buffer of pre-booted, workload-less microVMs of
              one OCI image, kept Ready so a SwiftSandbox that references the pool (via
              spec.poolRef) checks out in sub-second time instead of paying the cold
              materialize+boot. All warm slots of the image on a node share one materialized
              rootfs. Warming is node-local: a checkout that finds no free warm slot on its target
              node degrades to the normal cold path — a miss is never a silent failure.

              The fields below are the SLOT SHAPE (a workload-less SwiftSandbox). The workload
              (command/args/env/timeout/ttl) is NOT set here — it belongs to the individual
              SwiftSandbox that checks a slot out and is injected post-boot.
            properties:
              cpu:
                default: 1
                description: CPU is the vCPU count of each warm slot. A claiming SwiftSandbox
                  must match.
                format: int32
                minimum: 1
                type: integer
              gpuProfileRef:
                description: |-
                  GPUProfileRef, when set, makes this a WARM GPU POOL: every warm slot is a
                  GPU sandbox holding a native SwiftGPU allocation (a SwiftGPUProfile in the
                  pool's namespace), pre-booted so a checkout is sub-second instead of a cold
                  GPU boot + model load. This deliberately TRADES an idle GPU per warm slot
                  for latency — each of MinWarm slots holds a whole GPU idle — so size the
                  pool to your available GPUs (on an N-GPU cluster, keep minWarm <= N). A GPU
                  pool warms only on nodes that are both gpu-node and kernel-node. The DRA
                  backend (gpuResourceClaim) is a follow-up.
                properties:
                  name:
                    default: ""
                    description: |-
                      Name of the referent.
                      This field is effectively required, but due to backwards compatibility is
                      allowed to be empty. Instances of this type with an empty value here are
                      almost certainly wrong.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                    type: string
                type: object
                x-kubernetes-map-type: atomic
              image:
                description: |-
                  Image is the OCI image every warm slot boots as its root filesystem. A digest
                  reference (repo@sha256:...) is preferred for reproducibility. A SwiftSandbox must
                  request the same image (and slot shape) to claim a slot from this pool.
                type: string
              imagePullSecret:
                description: |-
                  ImagePullSecret optionally names a docker-registry Secret in the pool's namespace
                  for pulling Image from a private registry.
                type: string
              kernelProfileRef:
                description: |-
                  KernelProfileRef names the SwiftKernel sandbox profile to boot; defaults to the
                  well-known "sandbox" kernel when unset.
                properties:
                  name:
                    default: ""
                    description: |-
                      Name of the referent.
                      This field is effectively required, but due to backwards compatibility is
                      allowed to be empty. Instances of this type with an empty value here are
                      almost certainly wrong.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                    type: string
                type: object
                x-kubernetes-map-type: atomic
              maxWarm:
                description: |-
                  MaxWarm caps the total warm slots the pool will hold (back-pressure). 0 means no
                  cap beyond minWarm.
                format: int32
                minimum: 0
                type: integer
              memory:
                anyOf:
                - type: integer
                - type: string
                default: 512Mi
                description: |-
                  Memory is the RAM of each warm slot (e.g. "512Mi"). A claiming SwiftSandbox must
                  match. Note this is held per warm slot, so a pool of N slots holds N*Memory idle.
                pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                x-kubernetes-int-or-string: true
              minWarm:
                default: 1
                description: |-
                  MinWarm is the desired number of Ready (pre-booted, unclaimed) warm slots the pool
                  keeps. Because warming is node-local, the pool spreads these across the schedulable
                  kernel-nodes in scope; a claim that lands on a node with no free slot falls back to
                  the cold path.
                format: int32
                minimum: 0
                type: integer
              network:
                description: |-
                  Network is the slot networking posture (default restricted), the same modes as
                  SwiftSandbox: restricted | open | none.
                properties:
                  mode:
                    default: restricted
                    description: Mode is "restricted" (default), "open", or "none".
                    enum:
                    - restricted
                    - open
                    - none
                    type: string
                type: object
              nodeSelector:
                additionalProperties:
                  type: string
                description: |-
                  NodeSelector constrains which (kernel) nodes the pool warms slots on, merged with
                  the required kubeswift.io/kernel-node=true label.
                type: object
              rootfsMode:
                allOf:
                - enum:
                  - block
                  - virtiofs
                - enum:
                  - block
                  - virtiofs
                default: block
                description: |-
                  RootfsMode selects how each warm slot's OCI rootfs is delivered: block
                  (default, read-only ext4 disk) or virtiofs (the unpacked tree over
                  virtio-fs). A claiming SwiftSandbox must request the same mode.
                type: string
              verifyKeySecretRef:
                description: |-
                  VerifyKeySecretRef, when set, names a Secret in the pool's namespace holding a
                  cosign public key (key "cosign.pub"). Every warm slot cosign-verifies Image
                  against it before materializing; an unsigned/tampered image fails the slot so
                  the pool never warms an unverified rootfs. Requires a TLS registry.
                properties:
                  name:
                    description: Name of the Secret.
                    type: string
                required:
                - name
                type: object
            required:
            - image
            - memory
            type: object
          status:
            description: SwiftSandboxPoolStatus is the observed state.
            properties:
              claimedReplicas:
                description: ClaimedReplicas is the number of slots currently checked
                  out to a SwiftSandbox.
                format: int32
                type: integer
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              imageEnv:
                description: |-
                  ImageEnv is the pool image's config env ("KEY=VAL"), resolved once at
                  materialize. A checkout merges its SwiftSandbox.spec.env over this so the
                  injected workload sees the image env too — parity with a cold sandbox,
                  without a per-checkout registry pull.
                items:
                  type: string
                type: array
              message:
                type: string
              observedGeneration:
                description: ObservedGeneration is the pool generation last reconciled.
                format: int64
                type: integer
              phase:
                description: SwiftSandboxPoolPhase is the pool lifecycle phase.
                enum:
                - Pending
                - Warming
                - Ready
                - Degraded
                type: string
              rootfs:
                description: Rootfs reports the resolved+materialized image shared
                  by every slot.
                properties:
                  cachePath:
                    description: CachePath is the node-local rootfs artifact path.
                    type: string
                  digest:
                    description: Digest is the resolved image digest (sha256:...).
                    type: string
                  sizeBytes:
                    description: SizeBytes is the materialized ext4 (or tree) size.
                    format: int64
                    type: integer
                type: object
              selector:
                description: |-
                  Selector is the pool's warm-slot label selector serialized as a string.
                  Required by the scale subresource so `kubectl scale` and an HPA can target
                  the pool; it selects the warm-slot pods (sandbox.kubeswift.io/pool=<name>).
                type: string
              warmReplicas:
                description: WarmReplicas is the number of Ready, pre-booted, unclaimed
                  slots.
                format: int32
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      scale:
        labelSelectorPath: .status.selector
        specReplicasPath: .spec.minWarm
        statusReplicasPath: .status.warmReplicas
      status: {}
