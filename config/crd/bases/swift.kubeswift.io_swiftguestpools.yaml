                            or a PVC for a data disk.
                          properties:
                            imageRef:
                              description: |-
                                ImageRef references a SwiftImage for this data disk.
                                Mutually exclusive with PVCRef.
                              properties:
                                name:
                                  default: ""
                                  description: |-
                                    Name of the referent.
                                    This field is effectively required, but due to backwards compatibility is
                                    allowed to be empty. Instances of this type with an empty value here are
                                    almost certainly wrong.
                                    More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                                  type: string
                              type: object
                              x-kubernetes-map-type: atomic
                            name:
                              description: Name identifies this data disk (used for
                                volume naming).
                              type: string
                            pvcRef:
                              description: |-
                                PVCRef references a PersistentVolumeClaim directly.
                                Used by SwiftGuestPool for per-replica persistent storage.
                                Mutually exclusive with ImageRef.
                              properties:
                                name:
                                  default: ""
                                  description: |-
                                    Name of the referent.
                                    This field is effectively required, but due to backwards compatibility is
                                    allowed to be empty. Instances of this type with an empty value here are
                                    almost certainly wrong.
                                    More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                                  type: string
                              type: object
                              x-kubernetes-map-type: atomic
                          required:
                          - name
                          type: object
                        type: array
                      gpuProfileRef:
                        description: |-
