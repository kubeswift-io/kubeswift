---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: swiftsnapshots.snapshot.kubeswift.io
spec:
  group: snapshot.kubeswift.io
  names:
    kind: SwiftSnapshot
    listKind: SwiftSnapshotList
    plural: swiftsnapshots
    shortNames:
    - ssnap
    singular: swiftsnapshot
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .spec.guestRef.name
      name: Guest
      type: string
    - jsonPath: .spec.backend.type
      name: Backend
      type: string
    - jsonPath: .status.totalSizeBytes
      name: Size
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          SwiftSnapshot is a point-in-time capture of a SwiftGuest's disk (and
          optionally memory) state, for backup/restore and templating workflows.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: SwiftSnapshotSpec defines the desired state of a SwiftSnapshot.
            properties:
              backend:
                description: Backend selects how and where the snapshot is captured.
                properties:
                  csiVolumeSnapshot:
                    description: CSIVolumeSnapshotBackend configures the csi-volume-snapshot
                      backend.
                    properties:
                      volumeSnapshotClassName:
                        description: |-
                          VolumeSnapshotClassName is the snapshot.storage.k8s.io VolumeSnapshotClass
                          to use. If empty, the default VolumeSnapshotClass is used.
                        type: string
                    type: object
                  local:
                    description: Local is reserved for Phase 2.
                    properties:
                      hostPath:
                        description: HostPath is the directory on the node where the
                          snapshot is written.
                        type: string
                    type: object
                  s3:
                    description: S3 is reserved for Phase 3.
                    properties:
                      bucket:
                        description: Bucket is the S3 bucket. Required.
                        type: string
                      credentialsSecretRef:
                        description: |-
                          CredentialsSecretRef references a Secret (same namespace) with keys
                          accessKeyId, secretAccessKey, and optional sessionToken.
                        properties:
                          name:
                            type: string
                        required:
                        - name
                        type: object
                      endpoint:
                        description: |-
                          Endpoint is an S3-compatible endpoint host[:port] (MinIO, Ceph RGW).
                          Empty targets AWS S3.
                        type: string
                      forcePathStyle:
                        description: |-
                          ForcePathStyle uses path-style addressing (bucket in the path, not the
                          host) — typically required by MinIO / Ceph RGW.
                        type: boolean
                      insecure:
                        description: |-
                          Insecure allows a plaintext (http) endpoint instead of TLS. UNSAFE —
                          credentials and snapshot bytes traverse the network unencrypted. Use only
                          for an in-cluster MinIO / test store on a trusted network. Production S3
                          (AWS, TLS-fronted MinIO/RGW) must leave this false.
                        type: boolean
                      prefix:
                        description: |-
                          Prefix is an optional key prefix; objects land at
                          <prefix>/<namespace>/<snapshot>/.
                        type: string
                      region:
                        description: |-
                          Region is the S3 region (required for AWS; optional for some
                          S3-compatible stores).
                        type: string
                    type: object
                  type:
                    description: |-
                      SnapshotBackendType selects how the snapshot is captured and stored.
                      Phase 1 ships csi-volume-snapshot only; local and s3 are reserved for
                      later phases. The spec is structured so adding the other backends does
                      not require a breaking change.
                    enum:
                    - csi-volume-snapshot
                    - local
                    - s3
                    type: string
                required:
                - type
                type: object
              deletionPolicy:
                default: Delete
                description: |-
                  DeletionPolicy controls whether deleting this SwiftSnapshot also purges
                  its backend artifacts. Delete (default) purges the local hostPath / s3
                  objects; Retain leaves them in place (the cleanup finalizer is dropped
                  without a purge) for out-of-band archival. Ignored for
                  csi-volume-snapshot — the VolumeSnapshotClass deletionPolicy governs the
                  underlying VolumeSnapshot.
                enum:
                - Delete
                - Retain
                type: string
              guestRef:
                description: GuestRef points at the SwiftGuest in the same namespace
                  to snapshot.
                properties:
                  name:
                    type: string
                required:
                - name
                type: object
              includeMemory:
                default: true
                description: |-
                  IncludeMemory requests a memory snapshot in addition to disks. Ignored
                  for the csi-volume-snapshot backend (which is disk-only by definition).
                type: boolean
              resumeAfterSnapshot:
                default: true
                description: |-
                  ResumeAfterSnapshot controls whether the source SwiftGuest is resumed
                  after the snapshot completes (default true). false leaves the VM
                  stopped/paused for operator inspection. Ignored when the source guest
                  was already stopped at snapshot time (csi-volume-snapshot backend
                  stops the VM gracefully and restarts it iff this is true).
                type: boolean
            required:
            - backend
            - guestRef
            type: object
          status:
            description: SwiftSnapshotStatus is the observed state of a SwiftSnapshot.
            properties:
              capturedAt:
                format: date-time
                type: string
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              disks:
                items:
                  description: SnapshotDiskRef records one captured disk (root or
                    data) by role + handle.
                  properties:
                    diskName:
                      description: |-
                        DiskName is the SwiftGuest's logical disk name (used for "data" role
                        to disambiguate among multiple data disks). Empty for the root disk.
                      type: string
                    handle:
                      description: |-
                        Handle is the backend-specific identifier — for csi-volume-snapshot
                        this is "<namespace>/<volumesnapshot-name>". For local/s3 it is the
                        filesystem path / object key.
                      type: string
                    role:
                      description: Role is "root" or "data".
                      type: string
                    sizeBytes:
                      description: SizeBytes is the size at snapshot time.
                      format: int64
                      type: integer
                  required:
                  - role
                  type: object
                type: array
              guestSpec:
                description: |-
                  CapturedGuestSpec preserves the SwiftGuest's relevant spec fields at
                  snapshot time so SwiftRestore can validate compatibility on restore.
                properties:
                  cpu:
                    type: string
                  imageName:
                    type: string
                  memoryMi:
                    format: int64
                    type: integer
                type: object
              hypervisor:
                type: string
              hypervisorVersion:
                type: string
              memorySnapshot:
                description: |-
                  MemorySnapshotRef records the memory portion of a snapshot. Nil when
                  IncludeMemory is false or the backend is csi-volume-snapshot.
                properties:
                  handle:
                    type: string
                  sizeBytes:
                    format: int64
                    type: integer
                type: object
              nodeName:
                description: |-
                  NodeName is the Kubernetes node where the snapshot was taken.
                  Only set for the local backend (Tier B) — local snapshots live in
                  hostPath storage on a single node, and SwiftRestore uses this to
                  pin the restore-receive launcher pod to the same node.
                type: string
              observedPauseWindowMs:
                description: |-
                  ObservedPauseWindowMs is the wall-clock duration the source VM
                  was paused during capture, measured by swiftletd at the action
                  handler. Set on a successful local-backend capture; absent for
                  csi-volume-snapshot (which does not pause the VM).
                format: int64
                type: integer
              phase:
                description: |-
                  SwiftSnapshotPhase is the lifecycle phase of a SwiftSnapshot. The set of
                  phases is backend-dependent: csi-volume-snapshot uses
                  Pending -> Capturing -> Ready (and Failed). The local and s3 backends
                  (added in later phases) introduce additional phases (e.g. Uploading);
                  existing phase consumers must treat unknown phases as opaque.
                enum:
                - Pending
                - Capturing
                - Uploading
                - Ready
                - Failed
                type: string
              s3:
                description: |-
                  S3 records the object-storage location of an s3-backend export
                  (Phase 3 / Tier C). Set when the Uploading phase completes.
                properties:
                  location:
                    description: Location is the s3 URI of the snapshot prefix (s3://bucket/key/).
                    type: string
                  manifestDigest:
                    description: ManifestDigest is the sha256 of the uploaded manifest.json.
                    type: string
                  uploadedAt:
                    description: UploadedAt is when the Uploading phase completed.
                    format: date-time
                    type: string
                  uploadedBytes:
                    description: |-
                      UploadedBytes is the snapshot's total artifact footprint in S3 (read from
                      the upload Job's byte report). This is the snapshot's S3 size, not the
                      per-Job wire traffic — a resumed upload that skipped already-present
                      objects still reports the full footprint. Wire traffic is the
                      kubeswift_snapshot_upload_bytes_total metric.
                    format: int64
                    type: integer
                type: object
              snapshotDirVersion:
                description: |-
                  SnapshotDirVersion is the on-disk format version of the snapshot
                  directory, set at capture time. Currently always "v1". The
                  SwiftRestore controller's hypervisor-version check (architect
                  risk #3) compares this alongside major.minor of the CH version
                  before allowing a restore to proceed.
                type: string
              totalSizeBytes:
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
