---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: swiftimages.image.kubeswift.io
spec:
  group: image.kubeswift.io
  names:
    kind: SwiftImage
    listKind: SwiftImageList
    plural: swiftimages
    shortNames:
    - si
    singular: swiftimage
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.preparedArtifact.size
      name: Size
      type: string
    - jsonPath: .status.preparedFormat
      name: Format
      priority: 1
      type: string
    - jsonPath: .spec.cloneStrategy
      name: Strategy
      priority: 1
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: SwiftImage is the Schema for the swiftimages API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: SwiftImageSpec defines the desired state of SwiftImage.
            properties:
              cloneStorageClassName:
                description: |-
                  CloneStorageClassName overrides the storage class used for per-guest
                  clone PVCs. Defaults to the import PVC's storage class. Most CSI
                  drivers cannot snapshot/clone across storage classes, so changing
                  this on a snapshot-strategy image is generally an operator error and
                  will surface as a provisioning failure.
                type: string
              cloneStrategy:
                default: copy
                description: |-
                  CloneStrategy controls how per-guest root disk PVCs are produced.
                  Defaults to "copy" for backward compatibility — existing images keep
                  working without changes. "snapshot" requires a snapshot-capable CSI
                  driver (see docs/images/clone-strategies.md for the validated list).
                enum:
                - copy
                - snapshot
                type: string
              format:
                description: DiskFormat is the disk image format.
                enum:
                - raw
                - qcow2
                type: string
              osType:
                default: linux
                description: |-
                  OSType is the OS family this image contains: "linux" (default) or
                  "windows". Gates the Linux-only import steps (GRUB/serial patch,
                  growpart resize expectation). Default linux; existing images are
                  unaffected. (Windows guest support — see docs/design/windows-guest-support.md.)
                enum:
                - linux
                - windows
                type: string
              rootDisk:
                description: SwiftImageRootDiskSpec specifies root disk options for
                  the import PVC.
                properties:
                  size:
                    anyOf:
                    - type: integer
                    - type: string
                    description: |-
                      Size is the requested storage for the import PVC. Defaults to 10Gi if not set.
                      Should match or exceed SwiftGuestClass.rootDisk.size for guests using this image.
                    pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                    x-kubernetes-int-or-string: true
                type: object
              source:
                description: ImageSource defines the source of an image.
                properties:
                  http:
                    description: HTTPSource specifies an HTTP(S) URL to fetch the
                      image from.
                    properties:
                      url:
                        type: string
                    required:
                    - url
                    type: object
                  oci:
                    description: OCI pulls a golden raw disk artifact from an OCI
                      registry (P3).
                    properties:
                      credentialsSecretRef:
                        description: |-
                          CredentialsSecretRef references a kubernetes.io/dockerconfigjson Secret
                          (same namespace) for registry auth. Empty = anonymous.
                        properties:
                          name:
                            description: Name of the Secret.
                            type: string
                        required:
                        - name
                        type: object
                      digest:
                        description: |-
                          Digest pins the artifact by manifest digest (sha256:...). Mutually
                          exclusive with Tag; recommended for reproducibility (a tag is mutable).
                        type: string
                      insecure:
                        description: |-
                          Insecure allows a plaintext (http) registry. UNSAFE — in-cluster / test
                          registry only.
                        type: boolean
                      repository:
                        description: |-
                          Repository is the OCI repository WITHOUT a tag
                          (e.g. ghcr.io/org/golden-ubuntu-noble).
                        type: string
                      tag:
                        description: Tag selects the artifact by tag. Mutually exclusive
                          with Digest.
                        type: string
                      verifyKeySecretRef:
                        description: |-
                          VerifyKeySecretRef references a Secret (same namespace) holding a cosign
                          PUBLIC key under the key "cosign.pub". When set, the import verifies the
                          artifact's cosign signature (as produced by `swiftctl image publish
                          --sign-key`) BEFORE trusting its bytes, and FAILS the import if the
                          signature does not verify — no unsigned/tampered golden disk is imported.
                          Requires a TLS registry: cosign verify does not support a plaintext (http)
                          registry, so verifyKeySecretRef together with insecure is rejected at
                          admission.
                        properties:
                          name:
                            description: Name of the Secret.
                            type: string
                        required:
                        - name
                        type: object
                    required:
                    - repository
                    type: object
                  pvcClone:
                    description: PVCCloneSource specifies a source PVC to clone from.
                    properties:
                      name:
                        type: string
                      namespace:
                        type: string
                    required:
                    - name
                    type: object
                  upload:
                    description: UploadSource is a placeholder for future upload support.
                      Not yet implemented.
                    type: object
                type: object
              volumeSnapshotClassName:
                description: |-
                  VolumeSnapshotClassName names the snapshot.storage.k8s.io
                  VolumeSnapshotClass used when CloneStrategy is "snapshot". Required
                  for that strategy; ignored otherwise. The validation webhook
                  rejects "snapshot" without this field set.
                type: string
            required:
            - format
            - source
            type: object
          status:
            description: SwiftImageStatus defines the observed state of SwiftImage.
            properties:
              cloneSeed:
                description: |-
                  CloneSeed describes the resource per-guest cloning will reference.
                  Populated when CloneStrategy is "snapshot" and the seed VolumeSnapshot
                  reaches readyToUse=true. Nil for the legacy copy strategy.
                properties:
                  kind:
                    description: Kind is "VolumeSnapshot" for the Phase 1 csi-volume-snapshot
                      path.
                    enum:
                    - VolumeSnapshot
                    type: string
                  name:
                    description: |-
                      Name of the seed resource, in the same namespace as the SwiftImage.
                      Same-namespace is enforced — see Phase 0 spike finding §6a.
                    type: string
                  namespace:
                    description: |-
                      Namespace of the seed resource. Always equal to the SwiftImage's
                      namespace; recorded for callers that consume CloneSeed without
                      re-resolving the SwiftImage.
                    type: string
                  sourceSizeBytes:
                    description: |-
                      SourceSizeBytes is the size of the seed's underlying volume. Phase 1
                      uses this to pick the clone PVC's initial requested size (must equal
                      source size on Longhorn; see Phase 0 §5).
                    format: int64
                    type: integer
                required:
                - kind
                - name
                - namespace
                type: object
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              phase:
                description: SwiftImagePhase is the phase of a SwiftImage.
                enum:
                - Pending
                - Importing
                - Validating
                - Preparing
                - Snapshotting
                - Ready
                - Failed
                type: string
              preparedArtifact:
                description: PreparedArtifactRef references the prepared runtime artifact.
                properties:
                  format:
                    description: DiskFormat is the disk image format.
                    enum:
                    - raw
                    - qcow2
                    type: string
                  pvcRef:
                    description: PVCObjectReference references a PVC.
                    properties:
                      name:
                        type: string
                      namespace:
                        type: string
                    required:
                    - name
                    type: object
                  size:
                    anyOf:
                    - type: integer
                    - type: string
                    pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                    x-kubernetes-int-or-string: true
                required:
                - format
                type: object
              preparedFormat:
                description: DiskFormat is the disk image format.
                enum:
                - raw
                - qcow2
                type: string
              sizeHint:
                description: SizeHint is an internal field used to pass measured size
                  between Validating and Preparing phases.
                format: int64
                type: integer
              sourceFormat:
                description: DiskFormat is the disk image format.
                enum:
                - raw
                - qcow2
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
