---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: swiftrestores.snapshot.kubeswift.io
spec:
  group: snapshot.kubeswift.io
  names:
    kind: SwiftRestore
    listKind: SwiftRestoreList
    plural: swiftrestores
    shortNames:
    - srst
    singular: swiftrestore
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .spec.snapshotRef.name
      name: Snapshot
      type: string
    - jsonPath: .spec.targetGuest.name
      name: Target
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: SwiftRestore restores a SwiftSnapshot into a new (or existing)
          SwiftGuest.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: SwiftRestoreSpec defines the desired state of a SwiftRestore.
            properties:
              identity:
                description: |-
                  Identity controls per-clone identity regeneration. Phase 2 territory
                  (memory snapshots only); accepted in Phase 1 for forward compatibility.
                properties:
                  regenerate:
                    description: |-
                      Regenerate names the attributes the controller should reset on the
                      restored guest.
                    items:
                      description: |-
                        IdentityRegenerationItem names a guest-identity attribute to regenerate
                        when the snapshot is cloned into a new VM.
                      enum:
                      - hostname
                      - machineId
                      - sshHostKeys
                      - macAddresses
                      type: string
                    type: array
                type: object
              memoryRestoreMode:
                default: copy
                description: |-
                  MemoryRestoreMode selects Cloud Hypervisor's `memory_restore_mode`
                  (CH >= v52) for the restore-receive launcher:
                    copy     — eager: read the entire memory image before resuming
                               (default; predictable, the conservative DR posture).
                    ondemand — userfaultfd demand paging: resume immediately and fault
                               pages in lazily, cutting restore-to-resume latency for
                               large guests. Safe here because the snapshot memory file
                               is local + mounted read-only for the pod's lifetime.
                  cloneFromSnapshot always uses ondemand (fast pool scale-up); this field
                  is the opt-in for SwiftRestore. Only meaningful for memory snapshots
                  (local / s3 backends); ignored for csi-volume-snapshot (disk-only).
                enum:
                - copy
                - ondemand
                type: string
              resumeAfterRestore:
                default: true
                description: |-
                  ResumeAfterRestore controls whether the restored VM is resumed
                  automatically (default true). false leaves the VM in the post-restore
                  Paused state for operator inspection.
                type: boolean
              snapshotRef:
                description: |-
                  SnapshotRef selects the SwiftSnapshot to restore. Must be in the same
                  namespace as the SwiftRestore.
                properties:
                  name:
                    type: string
                required:
                - name
                type: object
              targetGuest:
                description: TargetGuest names the resulting SwiftGuest.
                properties:
                  name:
                    description: |-
                      Name of the resulting SwiftGuest. May match an existing SwiftGuest
                      only if OverwriteExisting is true.
                    type: string
                  overwriteExisting:
                    description: |-
                      OverwriteExisting must be true to restore over a SwiftGuest that
                      already exists at the target Name. The existing guest is gracefully
                      stopped before the restore proceeds.
                    type: boolean
                required:
                - name
                type: object
              targetNode:
                description: |-
                  TargetNode pins the node the restore lands on. It is only consulted for
                  the s3 (Tier C) backend, where the artifacts live in object storage and
                  the download Job + restore-receive launcher must be co-located on the
                  chosen node. When empty for an s3 restore, the controller falls back to
                  the in-place target guest's current node; a clone/cross-node s3 restore
                  (target guest does not yet exist) requires this field. Ignored for the
                  csi-volume-snapshot and local backends (local is pinned to the capture
                  node).
                type: string
            required:
            - snapshotRef
            - targetGuest
            type: object
          status:
            description: SwiftRestoreStatus is the observed state of a SwiftRestore.
            properties:
              completedAt:
                format: date-time
                type: string
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              downloadedBytes:
                description: |-
                  DownloadedBytes is the snapshot's total artifact footprint materialized on
                  the target node for an s3 (Tier C) restore — read from the download Job's
                  byte report. Absent for local/csi restores (no download step).
                format: int64
                type: integer
              guestRef:
                description: |-
                  SwiftRestoreGuestRef is the SwiftGuest the SwiftRestore produced (or
                  updated, when OverwriteExisting was true).
                properties:
                  name:
                    type: string
                required:
                - name
                type: object
              phase:
                description: SwiftRestorePhase is the lifecycle phase of a SwiftRestore.
                enum:
                - Pending
                - Downloading
                - Restoring
                - Resuming
                - Ready
                - Failed
                type: string
              startedAt:
                format: date-time
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
