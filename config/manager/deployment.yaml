apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  namespace: kubeswift-system
  labels:
    app.kubernetes.io/name: kubeswift
    app.kubernetes.io/component: controller-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kubeswift
      app.kubernetes.io/component: controller-manager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kubeswift
        app.kubernetes.io/component: controller-manager
    spec:
      serviceAccountName: controller-manager
      containers:
        - name: controller-manager
          image: ghcr.io/kubeswift-io/kubeswift/controller-manager:latest
          args:
            - --leader-elect
            - --webhook-enabled=false
            # Live-migration mTLS (Phase 3c) is off in the minimal install.
            # The config/overlays/migration-mtls overlay flips this to true
            # and provisions the cert-manager PKI chain (mirrors the Helm
            # migration.mtls.enabled gate). See `make deploy-with-mtls`.
            - --migration-mtls-enabled=false
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          ports:
            - containerPort: 9443
              name: webhook
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
