# ClusterRole for controller-manager: CRD reconciliation, Pods, ConfigMaps, PVCs, etc.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubeswift-controller-manager
  labels:
    app.kubernetes.io/name: kubeswift
rules:
  # SwiftGuest
  - apiGroups: ["swift.kubeswift.io"]
    resources: ["swiftguests", "swiftguests/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # SwiftGuestPool
  - apiGroups: ["swift.kubeswift.io"]
    resources: ["swiftguestpools", "swiftguestpools/status", "swiftguestpools/scale"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["swift.kubeswift.io"]
    resources: ["swiftguestclasses"]
    verbs: ["get", "list", "watch"]
  # SwiftImage
  - apiGroups: ["image.kubeswift.io"]
    resources: ["swiftimages", "swiftimages/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # SwiftSeedProfile
  - apiGroups: ["seed.kubeswift.io"]
    resources: ["swiftseedprofiles"]
    verbs: ["get", "list", "watch"]
  # SwiftKernel
  - apiGroups: ["kernel.kubeswift.io"]
    resources: ["swiftkernels", "swiftkernels/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # SwiftGPUProfile
  - apiGroups: ["gpu.kubeswift.io"]
    resources: ["swiftgpuprofiles"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # SwiftGPUNode — discovery DaemonSet and controller both write status
  - apiGroups: ["gpu.kubeswift.io"]
    resources: ["swiftgpunodes"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["gpu.kubeswift.io"]
    resources: ["swiftgpunodes/status"]
    verbs: ["get", "update", "patch"]
  # SwiftSnapshot / SwiftRestore (snapshot.kubeswift.io)
  - apiGroups: ["snapshot.kubeswift.io"]
    resources: ["swiftsnapshots", "swiftsnapshots/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["snapshot.kubeswift.io"]
    resources: ["swiftrestores", "swiftrestores/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # SwiftMigration (migration.kubeswift.io). Status patches go through
  # the /status subresource. The controller patches SwiftGuest spec
  # fields (runPolicy, nodeName) using the existing
  # swift.kubeswift.io/swiftguests grant; no additional grant needed
  # there. VolumeAttachment list (storage.k8s.io) is added below for
  # the Preparing phase's dual-poll.
  - apiGroups: ["migration.kubeswift.io"]
    resources: ["swiftmigrations", "swiftmigrations/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # snapshot.storage.k8s.io VolumeSnapshots — owned by SwiftSnapshot/SwiftImage,
  # read by SwiftRestore. The CSI external-snapshotter owns VolumeSnapshotContent
  # and VolumeSnapshotClass; the controller-manager only needs read for class.
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: ["volumesnapshots"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: ["volumesnapshotclasses"]
    verbs: ["get", "list", "watch"]
  # snapshot.storage.k8s.io VolumeSnapshotContents — get,patch only.
  # The CSI external-snapshotter owns VSC creation/deletion (the
  # controller never creates or deletes VSCs). The SwiftImage
  # controller patches the
  # snapshot.storage.kubernetes.io/allow-volume-mode-change annotation
  # on the cloneSeed VSC after the snapshotter binds it (W9.x / issue
  # #37) so RWX+Block guests can clone from a Filesystem-mode source
  # snapshot. Without these verbs the patch fails 403 and snapshot+
  # Block guests never reach Running.
  #
  # list,watch are required by controller-runtime's cached client (the
  # informer cache opens a watch on every GETable resource — same
  # pattern as W7 rolebindings, W8 storageclasses).
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: ["volumesnapshotcontents"]
    verbs: ["get", "list", "watch", "patch"]
  # Core resources
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods", "pods/status", "pods/log"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  # storage.k8s.io VolumeAttachment — read-only. The SwiftMigration
  # controller's Preparing phase polls VolumeAttachments to verify the
  # source-node CSI ControllerUnpublishVolume has completed before
  # advancing to StopAndCopy (cross-node attach gate; without this
  # the destination pod hits Multi-Attach errors on RWO storage).
  - apiGroups: ["storage.k8s.io"]
    resources: ["volumeattachments"]
    verbs: ["get", "list", "watch"]
  # storage.k8s.io StorageClass — read-only. The SwiftGuest controller's
  # checkStorageReady (PR #32) inspects the resolved StorageClass to
  # verify the Longhorn migratable parameter for RWX+Block guests.
  # list+watch are required because controller-runtime's cached client
  # opens an informer on every GETable resource — same pattern as W7
  # for rolebindings; without list+watch the informer cache fails to
  # sync ("Failed to watch *v1.StorageClass" loop) and every reconcile
  # that touches the cached client blocks indefinitely. PR #32 W8
  # follow-up.
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list", "watch"]
  # Leader election (controller-runtime uses coordination.k8s.io/leases)
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["create", "get", "update", "patch", "list", "watch"]
  # rbac.authorization.k8s.io RoleBindings — the SwiftGuest controller
  # creates a per-namespace RoleBinding that binds the
  # `kubeswift-swiftletd-reporter` ClusterRole to the workload
  # namespace's `default` ServiceAccount. This replaces the prior
  # operator-applied RoleBinding pattern (snapshot walkthrough finding
  # F2 + Phase 2 walkthrough finding W3). Per-call permissions:
  #   - get      — to detect whether the binding already exists (idempotent)
  #   - create   — to create it on first SwiftGuest reconcile in a namespace
  #   - list,watch — controller-runtime's default cached client requires
  #                  these to populate the informer cache for RoleBinding;
  #                  without them, Get returns "Failed to watch" errors
  #                  and the cache never syncs (Phase 2 walkthrough
  #                  W3 follow-up — the original PR #30 grant of just
  #                  get,create blocked Reconcile because the cache
  #                  layer couldn't initialise).
  # No update/delete — the RoleBinding is owned by the namespace
  # lifecycle, not by individual SwiftGuests; deleting all SwiftGuests
  # in a namespace doesn't remove the binding.
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["rolebindings"]
    verbs: ["get", "list", "watch", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubeswift-controller-manager
  labels:
    app.kubernetes.io/name: kubeswift
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubeswift-controller-manager
subjects:
  - kind: ServiceAccount
    name: controller-manager
    namespace: kubeswift-system
---
# ClusterRole for swiftletd (the launcher container) — read/patch its
# own pod's annotations and patch the SwiftGuest's /status subresource.
# Bound per workload namespace via a RoleBinding the SwiftGuest
# controller creates on Reconcile (see internal/controller/swiftguest/rbac.go).
# See config/rbac/swiftletd-role.yaml for the operator-facing comment
# and history.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubeswift-swiftletd-reporter
  labels:
    app.kubernetes.io/name: kubeswift
rules:
  - apiGroups: ["swift.kubeswift.io"]
    resources: ["swiftguests/status"]
    verbs: ["get", "patch", "update"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "patch", "update"]
