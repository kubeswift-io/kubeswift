# Apply on each MEMBER cluster (NOT the hub). Grants the gateway's member
# credential the rights it needs for auth-mode=token: impersonate end users +
# read the fleet's VMs as them. Bind your real users/groups (from your IdP) to
# the reader role separately.
#
# Assumes the member credential authenticates as the ServiceAccount
# `kubeswift-gateway` in `kubeswift-system` — adjust to match your kubeconfig.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubeswift-gateway
  namespace: kubeswift-system
---
# 1) Let the member credential impersonate end users + groups.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubeswift-gateway-impersonator
rules:
  - apiGroups: [""]
    resources: ["users", "groups"]
    verbs: ["impersonate"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubeswift-gateway-impersonator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubeswift-gateway-impersonator
subjects:
  - kind: ServiceAccount
    name: kubeswift-gateway
    namespace: kubeswift-system
---
# 2) A read-only VM role to bind your IMPERSONATED users/groups to (so the UI
#    can list their VMs). Bind real subjects from your IdP — this sample binds
#    an example group.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubeswift-vm-reader
rules:
  - apiGroups: ["swift.kubeswift.io"]
    resources: ["swiftguests", "swiftguestclasses", "swiftguestpools"]
    verbs: ["get", "list", "watch"]
  # MicroVM inventory (UI SandboxService read plane, v0.11.0). Add the
  # create/delete verbs alongside the write plane (A3).
  - apiGroups: ["sandbox.kubeswift.io"]
    resources: ["swiftsandboxes", "swiftsandboxpools"]
    verbs: ["get", "list", "watch"]
  # Lifecycle write actions (UI Start/Stop) patch swiftguests.spec.runPolicy.
  # Grant these to the subjects you want to be able to act; drop both rules for
  # a strictly read-only audience.
  - apiGroups: ["swift.kubeswift.io"]
    resources: ["swiftguests"]
    verbs: ["update", "patch"]
  # StopGuest also DELETES the launcher pod — the SwiftGuest stop guard is
  # reactive (it blocks recreation, it does not stop a running VM), so a
  # runPolicy patch alone would leave the guest running.
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete"]
  # The console plane execs `socat` in the launcher pod to bridge the serial
  # socket. pods/exec is powerful (arbitrary in-pod commands) — grant it only to
  # subjects allowed to open VM consoles; drop it to disable the console.
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  # The migrate action creates a SwiftMigration; the migrations view lists them;
  # ListNodes (the migrate target picker) lists nodes.
  - apiGroups: ["migration.kubeswift.io"]
    resources: ["swiftmigrations"]
    verbs: ["get", "list", "watch", "create"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubeswift-vm-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubeswift-vm-reader
subjects:
  # Replace with the real users/groups your IdP issues (the subjects the
  # gateway impersonates). Example:
  - kind: Group
    name: kubeswift-operators
    apiGroup: rbac.authorization.k8s.io
---
# 3) Let the gateway CREDENTIAL (the SA the kubeconfig authenticates as, NOT the
#    impersonated user) discover this member's in-cluster Prometheus Service for
#    per-VM telemetry — used when the member's Cluster.spec.prometheusEndpoint is
#    empty. Read-only, low-sensitivity: a Prometheus Service is a fleet fact, not
#    a user view (the telemetry data query itself still runs as the impersonated
#    user). Omit this to require an explicit spec.prometheusEndpoint instead.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubeswift-gateway-discovery
rules:
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list"]
  # Optional: derive the endpoint from the Prometheus CR when the operator CRDs
  # are present. Drop this rule if monitoring.coreos.com is not installed.
  - apiGroups: ["monitoring.coreos.com"]
    resources: ["prometheuses"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubeswift-gateway-discovery
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubeswift-gateway-discovery
subjects:
  - kind: ServiceAccount
    name: kubeswift-gateway
    namespace: kubeswift-system
