apiVersion: v1
kind: Secret
metadata:
  name: cloud-init-userdata
  namespace: default
type: Opaque
stringData:
  userdata: |
    #cloud-config
    hostname: kubeswift-from-secret
    package_update: true
---
apiVersion: seed.kubeswift.io/v1alpha1
kind: SwiftSeedProfile
metadata:
  name: with-secret
  namespace: default
spec:
  datasource: NoCloud
  userDataFrom:
    secretKeyRef:
      name: cloud-init-userdata
      key: userdata
  metaData: |
    instance-id: kubeswift-secret-001
    local-hostname: kubeswift-from-secret
