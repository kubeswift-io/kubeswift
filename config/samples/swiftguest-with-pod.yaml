# SwiftGuest that triggers pod creation.
# Apply after SwiftGuestClass, SwiftImage (Ready), and SwiftSeedProfile exist.
# The controller creates:
#   - ConfigMap <name>-seed (if seedProfileRef)
#   - ConfigMap <name>-runtime-intent
#   - Pod <name> with image volume, seed volume, intent ConfigMap
---
apiVersion: swift.kubeswift.io/v1alpha1
kind: SwiftGuest
metadata:
  name: guest-with-pod
  namespace: default
spec:
  imageRef:
    name: ubuntu-cloud
  guestClassRef:
    name: default
  seedProfileRef:
    name: minimal
  runPolicy: Running
