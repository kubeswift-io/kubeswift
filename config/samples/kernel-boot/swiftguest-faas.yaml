# Kernel boot SwiftGuest using faas-minimal kernel.
# Requires: SwiftGuestClass "default" (shared/), SwiftKernel "faas-minimal" Ready,
# and at least one node labeled kubeswift.io/kernel-node=true.
apiVersion: swift.kubeswift.io/v1alpha1
kind: SwiftGuest
metadata:
  name: faas-test
  namespace: default
spec:
  kernelRef:
    name: faas-minimal
  guestClassRef:
    name: default
  kernelCmdline: "console=ttyS0 root=/dev/ram0 rdinit=/init"
  runPolicy: Running
