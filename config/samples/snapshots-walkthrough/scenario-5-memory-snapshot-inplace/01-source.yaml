# Scenario 5: source SwiftGuest for the Tier B in-place memory restore.
# Same shape as Scenario 1's source — boot Ubuntu Noble, write a
# sentinel — but the sentinel goes on tmpfs (RAM-only), so it can
# survive ONLY if the memory snapshot/restore actually preserved
# in-memory state across the kill+restore cycle.
apiVersion: image.kubeswift.io/v1alpha1
kind: SwiftImage
metadata:
  name: ubuntu-noble
spec:
  format: qcow2
  rootDisk:
    size: "10Gi"
  source:
    http:
      url: https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img
---
apiVersion: seed.kubeswift.io/v1alpha1
kind: SwiftSeedProfile
metadata:
  name: walkthrough-seed
spec:
  datasource: NoCloud
  userData: |
    #cloud-config
    hostname: scenario-5-source
    users:
      - name: kubeswift
        passwd: $6$kubeswift$/2TeJTNbX7JcApzW0gTbSFzCAN4eFcOdnQsI0lVANFpXhHmjqLy7npyhHxvT65kpUd0YKVMBAbRt3MUfV6eCJ.
        sudo: ALL=(ALL) NOPASSWD:ALL
        lock_passwd: false
        ssh_authorized_keys:
          - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIJ53Xu8rRSofCQqb91XUgZqQam+5Q2e7tOwr0egG/W5x
    runcmd:
      - systemctl enable --now getty@ttyS0.service
  metaData: |
    instance-id: walkthrough-s5-source
    local-hostname: scenario-5-source
---
apiVersion: swift.kubeswift.io/v1alpha1
kind: SwiftGuest
metadata:
  name: s5-source
spec:
  imageRef:
    name: ubuntu-noble
  guestClassRef:
    name: default
  seedProfileRef:
    name: walkthrough-seed
  runPolicy: Running
