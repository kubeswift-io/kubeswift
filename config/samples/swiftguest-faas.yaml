apiVersion: swift.kubeswift.io/v1alpha1
kind: SwiftGuestClass
metadata:
  name: default
  namespace: default
spec:
  cpu: "2"
  memory: "2Gi"
  rootDisk:
    size: "40Gi"
    format: raw
---
apiVersion: swift.kubeswift.io/v1alpha1
kind: SwiftGuest
metadata:
  name: faas-test
  namespace: default
spec:
  kernelRef:
    name: faas-minimal
  guestClassRef:
    name: default
  kernelCmdline: "console=ttyS0 root=/dev/ram0 rdinit=/init"
  runPolicy: Running