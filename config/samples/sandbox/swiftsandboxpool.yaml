# A warm pool: keeps N pre-booted, workload-less alpine microVMs ready so a
# SwiftSandbox with spec.poolRef pointing here checks out in sub-second time
# instead of paying the cold materialize + boot. All slots share one materialized
# rootfs and spread one-per-node across kernel-nodes; a checkout that finds no
# free slot falls back to the cold path automatically.
#
# See swiftsandbox-pooled.yaml for a sandbox that checks out from this pool, and
# docs/sandbox/warm-pool.md for the operator guide.
apiVersion: sandbox.kubeswift.io/v1alpha1
kind: SwiftSandboxPool
metadata:
  name: alpine-pool
  namespace: default
spec:
  image: docker.io/library/alpine:3.20
  cpu: 1
  memory: 512Mi
  minWarm: 2            # keep 2 ready slots (spread across kernel-nodes)
  maxWarm: 6            # never hold more than 6 warm slots
  idleTTL: 30m          # scale idle slots back toward 0 after 30m quiet
  network:
    mode: restricted    # restricted | open | none — same as SwiftSandbox
