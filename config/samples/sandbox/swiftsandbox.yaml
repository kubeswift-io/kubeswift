# A shell sandbox: boots alpine as an ephemeral OCI-rootfs microVM. Restricted
# network (nothing can reach it inbound); self-destructs 5m after it finishes.
#
# Prereq: a Ready SwiftKernel "sandbox" (swiftkernel-sandbox.yaml) on a node
# labeled kubeswift.io/kernel-node=true.
apiVersion: sandbox.kubeswift.io/v1alpha1
kind: SwiftSandbox
metadata:
  name: shell-sandbox
  namespace: default
spec:
  image: docker.io/library/alpine:3.20
  cpu: 1
  memory: 512Mi
  command: ["/bin/sh"]
  timeout: 10m
  ttl: 5m
  network:
    mode: restricted
---
# A pure-compute, network-isolated sandbox (no pod network at all) — the
# detonation / untrusted-code posture.
apiVersion: sandbox.kubeswift.io/v1alpha1
kind: SwiftSandbox
metadata:
  name: isolated-sandbox
  namespace: default
spec:
  image: docker.io/library/python:3.12-slim
  cpu: 2
  memory: 1Gi
  ttl: 10m
  network:
    mode: none
