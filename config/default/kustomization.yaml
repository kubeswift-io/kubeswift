# Install entrypoint for KubeSwift (minimal: no webhook).
# Apply CRDs first, then: kubectl apply -k config/default
# Note: swiftletd DaemonSet omitted. swiftletd runs only inside SwiftGuest pods (as launcher).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../namespace
  - ../manager
