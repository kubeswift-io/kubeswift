# Kustomization for swiftletd RBAC.
#
# As of 2026-04-29 swiftletd's permissions are scoped via a single
# cluster-wide ClusterRole (`kubeswift-swiftletd-reporter`). The
# RoleBinding is created per workload namespace by the SwiftGuest
# controller — operators do NOT apply RoleBindings manually anymore.
# Apply this kustomization once at install time (cluster-scoped):
#
#   kubectl apply -k config/rbac/
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - swiftletd-role.yaml
