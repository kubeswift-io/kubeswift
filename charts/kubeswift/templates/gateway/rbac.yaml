{{- if eq (include "kubeswift.gatewayEnabled" .) "true" }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubeswift-gateway
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: kubeswift
    app.kubernetes.io/component: gateway
---
# Hub-namespace permissions: read the fleet registry + its credential Secrets,
# and write Cluster status. Namespaced because a Cluster and its credential
# Secret live in the gateway's namespace (the Cluster API model).
#
# NOTE: the hub does NOT need the `impersonate` verb. Impersonation happens
# against MEMBER clusters using each member's own credential; that credential
# (in the Secret) must carry impersonate rights on its member cluster. See
# docs/ui/gateway.md.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kubeswift-gateway
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: kubeswift
    app.kubernetes.io/component: gateway
rules:
  - apiGroups: ["fleet.kubeswift.io"]
    resources: ["clusters"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["fleet.kubeswift.io"]
    resources: ["clusters/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kubeswift-gateway
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: kubeswift
    app.kubernetes.io/component: gateway
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kubeswift-gateway
subjects:
  - kind: ServiceAccount
    name: kubeswift-gateway
    namespace: {{ .Values.namespace }}
---
# Cluster-scoped: validate end-user bearer tokens (auth-mode=token).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubeswift-gateway
  labels:
    app.kubernetes.io/name: kubeswift
    app.kubernetes.io/component: gateway
rules:
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubeswift-gateway
  labels:
    app.kubernetes.io/name: kubeswift
    app.kubernetes.io/component: gateway
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubeswift-gateway
subjects:
  - kind: ServiceAccount
    name: kubeswift-gateway
    namespace: {{ .Values.namespace }}
{{- if eq (include "kubeswift.selfRegisterEnabled" .) "true" }}
---
# Self-registration: the gateway SA discovers the hub's OWN in-cluster Prometheus
# for the spec.local self entry (Cluster.status.prometheusEndpoint). Read-only
# Services list; gated on self-registration so a gateway that federates only
# remote members never gets it. Independent of authMode — which Prometheus a
# cluster has is a fleet fact, not a per-user view (mirrors the member-rbac
# sample's discovery grant for remote members).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubeswift-gateway-self-discovery
  labels:
    app.kubernetes.io/name: kubeswift
    app.kubernetes.io/component: gateway
rules:
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubeswift-gateway-self-discovery
  labels:
    app.kubernetes.io/name: kubeswift
    app.kubernetes.io/component: gateway
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubeswift-gateway-self-discovery
subjects:
  - kind: ServiceAccount
    name: kubeswift-gateway
    namespace: {{ .Values.namespace }}
{{- end }}
{{- if and (eq (include "kubeswift.selfRegisterEnabled" .) "true") (ne .Values.gateway.authMode "insecure") }}
---
# Self-registration under auth-mode oidc/token: the hub federates ITSELF via the
# gateway SA (Cluster spec.local: true), so that SA must be able to impersonate
# the signed-in user to act on the hub's own VMs as them. Granted ONLY for a
# self-registering, non-insecure hub (least privilege — a standalone or insecure
# hub never gets impersonate). The impersonated user still needs a role binding
# on the hub (config/samples/gateway/member-rbac.yaml), same as any member.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubeswift-gateway-self-impersonator
  labels:
    app.kubernetes.io/name: kubeswift
    app.kubernetes.io/component: gateway
rules:
  - apiGroups: [""]
    resources: ["users", "groups"]
    verbs: ["impersonate"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubeswift-gateway-self-impersonator
  labels:
    app.kubernetes.io/name: kubeswift
    app.kubernetes.io/component: gateway
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubeswift-gateway-self-impersonator
subjects:
  - kind: ServiceAccount
    name: kubeswift-gateway
    namespace: {{ .Values.namespace }}
{{- end }}
{{- end }}
