apiVersion: v1
kind: Service
metadata:
  name: kubeswift-controller-manager-metrics
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: kubeswift
    app.kubernetes.io/component: controller-manager
spec:
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: metrics
  selector:
    app.kubernetes.io/name: kubeswift
    app.kubernetes.io/component: controller-manager
