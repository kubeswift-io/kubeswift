apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: kubeswift
    app.kubernetes.io/component: controller-manager
spec:
  replicas: {{ .Values.controllerManager.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: kubeswift
      app.kubernetes.io/component: controller-manager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kubeswift
        app.kubernetes.io/component: controller-manager
    spec:
      serviceAccountName: controller-manager
      containers:
        - name: controller-manager
          image: {{ .Values.controllerManager.image.registry }}/controller-manager:{{ include "kubeswift.imageTag" (dict "tag" .Values.controllerManager.image.tag "appVersion" .Chart.AppVersion) }}
          env:
            - name: KUBESWIFT_LAUNCHER_IMAGE
              value: {{ .Values.swiftletd.image.registry }}/swiftletd:{{ include "kubeswift.imageTag" (dict "tag" .Values.swiftletd.image.tag "appVersion" .Chart.AppVersion) }}
            - name: KUBESWIFT_SNAPSHOT_S3_IMAGE
              value: {{ .Values.snapshotS3.image.registry }}/snapshot-s3:{{ include "kubeswift.imageTag" (dict "tag" .Values.snapshotS3.image.tag "appVersion" .Chart.AppVersion) }}
            - name: KUBESWIFT_SNAPSHOT_ORAS_IMAGE
              value: {{ .Values.snapshotORAS.image.registry }}/snapshot-oras:{{ include "kubeswift.imageTag" (dict "tag" .Values.snapshotORAS.image.tag "appVersion" .Chart.AppVersion) }}
            - name: KUBESWIFT_MIGRATION_STUNNEL_IMAGE
              value: {{ .Values.migrationStunnel.image.registry }}/migration-stunnel:{{ include "kubeswift.imageTag" (dict "tag" .Values.migrationStunnel.image.tag "appVersion" .Chart.AppVersion) }}
            - name: KUBESWIFT_SANDBOX_MATERIALIZE_IMAGE
              value: {{ .Values.sandboxMaterialize.image.registry }}/sandbox-materialize:{{ include "kubeswift.imageTag" (dict "tag" .Values.sandboxMaterialize.image.tag "appVersion" .Chart.AppVersion) }}
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          args:
            - --leader-elect
            {{- if .Values.webhook.enabled }}
            - --webhook-enabled=true
            {{- else }}
            - --webhook-enabled=false
            {{- end }}
            {{- if .Values.migration.mtls.enabled }}
            - --migration-mtls-enabled=true
            {{- end }}
          ports:
            - containerPort: 9443
              name: webhook
          resources:
            {{- toYaml .Values.controllerManager.resources | nindent 12 }}
          {{- if .Values.webhook.enabled }}
          volumeMounts:
            - name: webhook-cert
              mountPath: /tmp/k8s-webhook-server/serving-certs
              readOnly: true
          {{- end }}
      {{- if .Values.webhook.enabled }}
      volumes:
        - name: webhook-cert
          secret:
            secretName: kubeswift-webhook-cert
      {{- end }}
