# ClusterRole for controller-manager: CRD reconciliation, Pods, ConfigMaps, PVCs, etc.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubeswift-controller-manager
  labels:
    app.kubernetes.io/name: kubeswift
rules:
  # SwiftGuest
  - apiGroups: ["swift.kubeswift.io"]
    resources: ["swiftguests", "swiftguests/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["swift.kubeswift.io"]
    resources: ["swiftguestclasses"]
    verbs: ["get", "list", "watch"]
  # SwiftImage
  - apiGroups: ["image.kubeswift.io"]
    resources: ["swiftimages", "swiftimages/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # SwiftSeedProfile
  - apiGroups: ["seed.kubeswift.io"]
    resources: ["swiftseedprofiles"]
    verbs: ["get", "list", "watch"]
  # Core resources
  - apiGroups: [""]
    resources: ["pods", "pods/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  # Leader election (controller-runtime uses coordination.k8s.io/leases)
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["create", "get", "update", "patch", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubeswift-controller-manager
  labels:
    app.kubernetes.io/name: kubeswift
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubeswift-controller-manager
subjects:
  - kind: ServiceAccount
    name: controller-manager
    namespace: {{ .Values.namespace }}
