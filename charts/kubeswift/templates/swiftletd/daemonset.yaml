# DaemonSet for swiftletd on each node.
# DISABLED BY DEFAULT: swiftletd is designed to run only inside SwiftGuest pods (as the launcher).
# A standalone DaemonSet has no runtime-intent.json and will crash immediately.
# Set swiftletd.daemonset.enabled=true only if you have a node-level intent provider (not implemented).
{{- if .Values.swiftletd.daemonset.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: swiftletd
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: kubeswift
    app.kubernetes.io/component: swiftletd
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: kubeswift
      app.kubernetes.io/component: swiftletd
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kubeswift
        app.kubernetes.io/component: swiftletd
    spec:
      serviceAccountName: swiftletd
      hostPID: true
      hostNetwork: true
      tolerations:
        - operator: Exists
      containers:
        - name: swiftletd
          image: {{ .Values.swiftletd.image.registry }}/swiftletd:{{ include "kubeswift.imageTag" (dict "tag" .Values.swiftletd.image.tag "appVersion" .Chart.AppVersion) }}
          securityContext:
            privileged: true
          volumeMounts:
            - name: kubeswift-data
              mountPath: /var/lib/kubeswift
            - name: dev-kvm
              mountPath: /dev/kvm
          env:
            - name: KUBESWIFT_RUN_DIR
              value: /var/lib/kubeswift/run
            - name: KUBESWIFT_INTENT_PATH
              value: /var/lib/kubeswift/intent/runtime-intent.json
          resources:
            {{- toYaml .Values.swiftletd.resources | nindent 12 }}
      volumes:
        - name: kubeswift-data
          hostPath:
            path: /var/lib/kubeswift
            type: DirectoryOrCreate
        - name: dev-kvm
          hostPath:
            path: /dev/kvm
            type: CharDevice
{{- end }}
