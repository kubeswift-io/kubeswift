{{- if .Values.webhook.enabled }}
# ValidatingWebhookConfiguration for SwiftGuest, SwiftImage, SwiftSeedProfile.
# cert-manager CA injector populates caBundle via the inject-ca-from annotation.
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: kubeswift-validating-webhook
  annotations:
    cert-manager.io/inject-ca-from: {{ .Values.namespace }}/kubeswift-webhook-cert
  labels:
    app.kubernetes.io/name: kubeswift
    app.kubernetes.io/component: webhook
webhooks:
  - name: vswiftguest.swift.kubeswift.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Fail
    clientConfig:
      service:
        namespace: {{ .Values.namespace }}
        name: kubeswift-webhook-service
        path: /validate-swift-kubeswift-io-v1alpha1-swiftguest
    rules:
      - operations: [CREATE, UPDATE]
        apiGroups: ["swift.kubeswift.io"]
        apiVersions: ["v1alpha1"]
        resources: ["swiftguests"]
  - name: vswiftimage.image.kubeswift.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Fail
    clientConfig:
      service:
        namespace: {{ .Values.namespace }}
        name: kubeswift-webhook-service
        path: /validate-image-kubeswift-io-v1alpha1-swiftimage
    rules:
      - operations: [CREATE, UPDATE]
        apiGroups: ["image.kubeswift.io"]
        apiVersions: ["v1alpha1"]
        resources: ["swiftimages"]
  - name: vswiftseedprofile.seed.kubeswift.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Fail
    clientConfig:
      service:
        namespace: {{ .Values.namespace }}
        name: kubeswift-webhook-service
        path: /validate-seed-kubeswift-io-v1alpha1-swiftseedprofile
    rules:
      - operations: [CREATE, UPDATE]
        apiGroups: ["seed.kubeswift.io"]
        apiVersions: ["v1alpha1"]
        resources: ["swiftseedprofiles"]
  - name: vswiftsnapshot.snapshot.kubeswift.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Fail
    clientConfig:
      service:
        namespace: {{ .Values.namespace }}
        name: kubeswift-webhook-service
        path: /validate-snapshot-kubeswift-io-v1alpha1-swiftsnapshot
    rules:
      - operations: [CREATE, UPDATE]
        apiGroups: ["snapshot.kubeswift.io"]
        apiVersions: ["v1alpha1"]
        resources: ["swiftsnapshots"]
  - name: vswiftrestore.snapshot.kubeswift.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Fail
    clientConfig:
      service:
        namespace: {{ .Values.namespace }}
        name: kubeswift-webhook-service
        path: /validate-snapshot-kubeswift-io-v1alpha1-swiftrestore
    rules:
      - operations: [CREATE, UPDATE]
        apiGroups: ["snapshot.kubeswift.io"]
        apiVersions: ["v1alpha1"]
        resources: ["swiftrestores"]
  - name: vswiftsnapshotschedule.snapshot.kubeswift.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Fail
    clientConfig:
      service:
        namespace: {{ .Values.namespace }}
        name: kubeswift-webhook-service
        path: /validate-snapshot-kubeswift-io-v1alpha1-swiftsnapshotschedule
    rules:
      - operations: [CREATE, UPDATE]
        apiGroups: ["snapshot.kubeswift.io"]
        apiVersions: ["v1alpha1"]
        resources: ["swiftsnapshotschedules"]
  - name: vswiftmigration.migration.kubeswift.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Fail
    clientConfig:
      service:
        namespace: {{ .Values.namespace }}
        name: kubeswift-webhook-service
        path: /validate-migration-kubeswift-io-v1alpha1-swiftmigration
    rules:
      - operations: [CREATE, UPDATE]
        apiGroups: ["migration.kubeswift.io"]
        apiVersions: ["v1alpha1"]
        resources: ["swiftmigrations"]
  - name: vswiftsandbox.sandbox.kubeswift.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Fail
    clientConfig:
      service:
        namespace: {{ .Values.namespace }}
        name: kubeswift-webhook-service
        path: /validate-sandbox-kubeswift-io-v1alpha1-swiftsandbox
    rules:
      - operations: [CREATE, UPDATE]
        apiGroups: ["sandbox.kubeswift.io"]
        apiVersions: ["v1alpha1"]
        resources: ["swiftsandboxes"]
  # Phase 4 drain integration. Fires on EVERY pod eviction cluster-wide; the
  # handler fast-allows any pod that is not a SwiftGuest launcher pod.
  # failurePolicy: Ignore so a webhook outage never breaks evictions (the
  # per-guest PodDisruptionBudget is the hard floor). sideEffects:
  # NoneOnDryRun because the handler stamps a drain-requested marker on the
  # SwiftGuest (skipped on dry-run).
  - name: veviction.kubeswift.io
    admissionReviewVersions: ["v1"]
    sideEffects: NoneOnDryRun
    failurePolicy: Ignore
    matchPolicy: Equivalent
    timeoutSeconds: 10
    clientConfig:
      service:
        namespace: {{ .Values.namespace }}
        name: kubeswift-webhook-service
        path: /validate-pods-eviction
    rules:
      - operations: [CREATE]
        apiGroups: [""]
        apiVersions: ["v1"]
        resources: ["pods/eviction"]
{{- end }}
