{{- if .Values.webhook.enabled }}
# cert-manager Certificate for webhook TLS.
# Requires cert-manager to be installed. Creates a Secret with tls.crt and tls.key
# for the webhook Service DNS name.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: kubeswift-webhook-cert
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: kubeswift
    app.kubernetes.io/component: webhook
spec:
  secretName: kubeswift-webhook-cert
  duration: 8760h # 1 year
  renewBefore: 360h # 15 days
  subject:
    organizations:
      - kubeswift
  commonName: kubeswift-webhook-service.{{ .Values.namespace }}.svc
  dnsNames:
    - kubeswift-webhook-service
    - kubeswift-webhook-service.{{ .Values.namespace }}
    - kubeswift-webhook-service.{{ .Values.namespace }}.svc
  issuerRef:
    name: kubeswift-selfsigned-issuer
    kind: ClusterIssuer
    group: cert-manager.io
{{- end }}
