{{- if .Values.webhook.enabled }}
# Self-signed ClusterIssuer for webhook cert (development).
# For production, use a proper Issuer (e.g. cert-manager CA or Let's Encrypt).
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: kubeswift-selfsigned-issuer
  labels:
    app.kubernetes.io/name: kubeswift
spec:
  selfSigned: {}
{{- end }}
