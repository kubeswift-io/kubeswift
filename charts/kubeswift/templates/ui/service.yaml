{{- if eq (include "kubeswift.uiEnabled" .) "true" }}
apiVersion: v1
kind: Service
metadata:
  name: kubeswift-ui
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: kubeswift
    app.kubernetes.io/component: ui
spec:
  type: {{ .Values.ui.service.type }}
  selector:
    app.kubernetes.io/name: kubeswift
    app.kubernetes.io/component: ui
  ports:
    - name: http
      port: {{ .Values.ui.service.port }}
      targetPort: http
{{- end }}
