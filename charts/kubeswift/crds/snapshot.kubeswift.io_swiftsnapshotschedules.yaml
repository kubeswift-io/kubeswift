---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: swiftsnapshotschedules.snapshot.kubeswift.io
spec:
  group: snapshot.kubeswift.io
  names:
    kind: SwiftSnapshotSchedule
    listKind: SwiftSnapshotScheduleList
    plural: swiftsnapshotschedules
    shortNames:
    - sss
    singular: swiftsnapshotschedule
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.schedule
      name: Schedule
      type: string
    - jsonPath: .spec.suspend
      name: Suspend
      type: boolean
    - jsonPath: .spec.template.spec.guestRef.name
      name: Guest
      type: string
    - jsonPath: .status.lastScheduleTime
      name: Last-Schedule
      type: date
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          SwiftSnapshotSchedule creates SwiftSnapshots of a SwiftGuest on a cron
          schedule, with optional count-based (keepLast) retention.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: SwiftSnapshotScheduleSpec defines the desired state of a
              SwiftSnapshotSchedule.
            properties:
              concurrencyPolicy:
                default: Forbid
                description: |-
                  ConcurrencyPolicy controls overlapping runs. Forbid (default) skips a tick
                  while a prior scheduled snapshot is still in flight; Allow lets them overlap.
                enum:
                - Forbid
                - Allow
                type: string
              retention:
                description: |-
                  Retention controls count-based pruning (keepLast) of this schedule's
                  snapshots. Composes with each snapshot's age-based spec.ttl.
                properties:
                  keepLast:
                    description: |-
                      KeepLast keeps the most recent N Ready snapshots created by this schedule;
                      older Ready ones are deleted (honoring each snapshot's deletionPolicy, and
                      never deleting one still referenced by a cloneFromSnapshot SwiftGuest or an
                      in-flight SwiftRestore). Non-terminal and Failed snapshots do not count
                      toward the budget and are not pruned by keepLast. Unset = keep all (rely on
                      per-snapshot ttl or manual deletion).
                    format: int32
                    minimum: 1
                    type: integer
                type: object
              schedule:
                description: |-
                  Schedule is a standard 5-field cron expression, evaluated in UTC.
                  Example: "0 2 * * *" (daily at 02:00 UTC).
                type: string
              startingDeadlineSeconds:
                description: |-
                  StartingDeadlineSeconds bounds how late a tick may fire: a tick missed by
                  more than this (e.g. during a controller outage) is skipped rather than
                  run, avoiding a catch-up stampede. Unset = no deadline.
                format: int64
                type: integer
              suspend:
                description: |-
                  Suspend pauses the schedule (no new snapshots) without deleting it or its
                  existing snapshots.
                type: boolean
              template:
                description: Template is the SwiftSnapshot to create each time the
                  schedule fires.
                properties:
                  metadata:
                    description: SnapshotTemplateMeta is the metadata merged onto
                      each created SwiftSnapshot.
                    properties:
                      annotations:
                        additionalProperties:
                          type: string
                        type: object
                      labels:
                        additionalProperties:
                          type: string
                        type: object
                    type: object
                  spec:
                    description: |-
                      Spec is the SwiftSnapshotSpec to instantiate (same shape as a hand-written
                      SwiftSnapshot — guestRef, backend, includeMemory, deletionPolicy, ttl).
                    properties:
                      backend:
                        description: Backend selects how and where the snapshot is
                          captured.
                        properties:
                          csiVolumeSnapshot:
                            description: CSIVolumeSnapshotBackend configures the csi-volume-snapshot
                              backend.
                            properties:
                              volumeSnapshotClassName:
                                description: |-
                                  VolumeSnapshotClassName is the snapshot.storage.k8s.io VolumeSnapshotClass
                                  to use. If empty, the default VolumeSnapshotClass is used.
                                type: string
                            type: object
                          local:
                            description: Local is reserved for Phase 2.
                            properties:
                              hostPath:
                                description: HostPath is the directory on the node
                                  where the snapshot is written.
                                type: string
                            type: object
                          s3:
                            description: S3 is reserved for Phase 3.
                            properties:
                              bucket:
                                description: Bucket is the S3 bucket. Required.
                                type: string
                              credentialsSecretRef:
                                description: |-
                                  CredentialsSecretRef references a Secret (same namespace) with keys
                                  accessKeyId, secretAccessKey, and optional sessionToken.
                                properties:
                                  name:
                                    type: string
                                required:
                                - name
                                type: object
                              endpoint:
                                description: |-
                                  Endpoint is an S3-compatible endpoint host[:port] (MinIO, Ceph RGW).
                                  Empty targets AWS S3.
                                type: string
                              forcePathStyle:
                                description: |-
                                  ForcePathStyle uses path-style addressing (bucket in the path, not the
                                  host) — typically required by MinIO / Ceph RGW.
                                type: boolean
                              insecure:
                                description: |-
                                  Insecure allows a plaintext (http) endpoint instead of TLS. UNSAFE —
                                  credentials and snapshot bytes traverse the network unencrypted. Use only
                                  for an in-cluster MinIO / test store on a trusted network. Production S3
                                  (AWS, TLS-fronted MinIO/RGW) must leave this false.
                                type: boolean
                              prefix:
                                description: |-
                                  Prefix is an optional key prefix; objects land at
                                  <prefix>/<namespace>/<snapshot>/.
                                type: string
                              region:
                                description: |-
                                  Region is the S3 region (required for AWS; optional for some
                                  S3-compatible stores).
                                type: string
                            type: object
                          type:
                            description: |-
                              SnapshotBackendType selects how the snapshot is captured and stored.
                              Phase 1 ships csi-volume-snapshot only; local and s3 are reserved for
                              later phases. The spec is structured so adding the other backends does
                              not require a breaking change.
                            enum:
                            - csi-volume-snapshot
                            - local
                            - s3
                            type: string
                        required:
                        - type
                        type: object
                      deletionPolicy:
                        default: Delete
                        description: |-
                          DeletionPolicy controls whether deleting this SwiftSnapshot also purges
                          its backend artifacts. Delete (default) purges the local hostPath / s3
                          objects; Retain leaves them in place (the cleanup finalizer is dropped
                          without a purge) for out-of-band archival. Ignored for
                          csi-volume-snapshot — the VolumeSnapshotClass deletionPolicy governs the
                          underlying VolumeSnapshot.
                        enum:
                        - Delete
                        - Retain
                        type: string
                      guestRef:
                        description: GuestRef points at the SwiftGuest in the same
                          namespace to snapshot.
                        properties:
                          name:
                            type: string
                        required:
                        - name
                        type: object
                      includeMemory:
                        default: true
                        description: |-
                          IncludeMemory requests a memory snapshot in addition to disks. NOTE: the
                          captured set is backend-determined, not controlled by this flag —
                          local/s3 use a Cloud Hypervisor vm.snapshot, which ALWAYS includes memory,
                          while csi-volume-snapshot is disk-only by definition. So includeMemory:false
                          is a no-op on every backend (the webhook surfaces a warning for local/s3);
                          for a truly disk-only snapshot, use the csi-volume-snapshot backend. The
                          field remains for forward compatibility and manifest metadata.
                        type: boolean
                      resumeAfterSnapshot:
                        default: true
                        description: |-
                          ResumeAfterSnapshot controls whether the source SwiftGuest is resumed
                          after the snapshot completes (default true). false leaves the VM
                          stopped/paused for operator inspection. Ignored when the source guest
                          was already stopped at snapshot time (csi-volume-snapshot backend
                          stops the VM gracefully and restarts it iff this is true).
                        type: boolean
                      ttl:
                        description: |-
                          TTL, when set, makes the controller delete this SwiftSnapshot once
                          status.capturedAt + ttl has elapsed; the normal deletion path then runs,
                          honoring deletionPolicy. The controller refuses to delete a snapshot
                          still referenced by a cloneFromSnapshot SwiftGuest or an in-flight
                          SwiftRestore — it sets a RetentionBlocked condition and retries until the
                          references clear. An operator-initiated `kubectl delete` is never blocked.
                          Unset means keep until deleted by hand.
                        type: string
                    required:
                    - backend
                    - guestRef
                    type: object
                required:
                - spec
                type: object
            required:
            - schedule
            - template
            type: object
          status:
            description: SwiftSnapshotScheduleStatus is the observed state of a SwiftSnapshotSchedule.
            properties:
              active:
                description: Active lists the names of in-flight (non-terminal) scheduled
                  snapshots.
                items:
                  type: string
                type: array
              conditions:
                description: Conditions exposes Ready.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              lastScheduleTime:
                description: LastScheduleTime is when the controller last fired a
                  tick.
                format: date-time
                type: string
              lastSuccessfulTime:
                description: LastSuccessfulTime is when a scheduled snapshot last
                  reached Ready.
                format: date-time
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
