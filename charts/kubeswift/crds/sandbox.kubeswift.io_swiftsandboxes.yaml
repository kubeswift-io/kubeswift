                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              exitCode:
                description: ExitCode is the workload/guest exit code when known.
                format: int32
                type: integer
              gpu:
                description: |-
                  GPU is the native SwiftGPU allocation (devices, node, NUMA), populated by
                  the SwiftGPU controller when spec.gpuProfileRef is set. Absent for the DRA
                  backend (the device identity lives in the pod's ResourceClaim) and for
                  non-GPU sandboxes.
                properties:
                  devices:
                    description: Devices lists the PCI addresses of allocated GPUs
                      (e.g. "0000:41:00.0").
                    items:
                      type: string
                    type: array
                  hypervisor:
                    description: Hypervisor is the resolved hypervisor for this guest
                      ("cloud-hypervisor" or "qemu").
                    type: string
                  nodeName:
                    description: NodeName is the Kubernetes node where GPUs were allocated.
                    type: string
                  numaNodes:
                    description: NUMANodes lists the NUMA node IDs the allocated GPUs
                      are attached to.
                    items:
                      type: integer
                    type: array
                  partitionId:
                    description: |-
                      PartitionID is the Fabric Manager partition ID for shared NVSwitch mode.
                      -1 means no partition (isolated or full passthrough mode).
                    type: integer
                type: object
              message:
                type: string
              model:
                description: |-
                  Model reports the materialized model artifact once resolved. Absent when
                  spec.model is unset.
                properties:
                  cachePath:
                    description: CachePath is the node-local model tree path (virtio-fs
                      source).
                    type: string
                  digest:
                    description: Digest is the resolved model image digest (sha256:...).
                    type: string
                  mountPath:
                    description: MountPath is the read-only in-guest mount point.
                    type: string
                type: object
              network:
                description: |-
                  Network is the guest network (primaryIP), reported by the swiftletd lease
                  poller. Absent for network:none sandboxes.
                properties:
                  primaryIP:
                    description: PrimaryIP is the guest's DHCP-assigned IP (network:restricted
                      only).
                    type: string
                type: object
              nodeName:
                type: string
              phase:
                description: SwiftSandboxPhase is the lifecycle phase.
                enum:
                - Pending
                - Materializing
                - Running
                - Completed
                - Failed
                type: string
              podRef:
                description: PodRef is the launcher pod name.
                type: string
              rootfs:
                description: SandboxRootfsStatus reports the materialized OCI rootfs.
                properties:
                  cachePath:
                    description: CachePath is the node-local rootfs artifact path.
                    type: string
                  digest:
                    description: Digest is the resolved image digest (sha256:...).
                    type: string
                  sizeBytes:
                    description: SizeBytes is the materialized ext4 (or tree) size.
                    format: int64
                    type: integer
                type: object
              runtime:
                description: Runtime is the live guest runtime (pid/hypervisor), reported
                  by swiftletd.
                properties:
                  hypervisor:
                    description: Hypervisor is the resolved VMM (always cloud-hypervisor
                      for a sandbox).
                    type: string
                  pid:
                    description: PID is the host PID of the hypervisor process.
                    format: int64
                    type: integer
                type: object
              scratchDisk:
                description: |-
                  ScratchDisk reports the attached scratch disk once its PVC is Bound.
                  Absent when spec.scratchDisk is unset.
                properties:
                  bound:
                    description: Bound is true once the PVC is Bound.
                    type: boolean
                  devicePath:
                    description: |-
                      DevicePath is the launcher-side host device path (/dev/kubeswift-data-scratch).
                      Inside the guest it is a raw virtio-blk device (typically /dev/vdc).
                    type: string
                  pvcName:
                    description: PVCName is the bound PVC (sandbox-owned for blank,
                      the operator's for pvcRef).
                    type: string
                type: object
              startedAt:
                description: StartedAt is when the guest began running.
                format: date-time
                type: string
              terminalAt:
                description: |-
                  TerminalAt is when the sandbox first reached a terminal phase
                  (Completed/Failed); the anchor for spec.ttl-driven deletion.
                format: date-time
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
