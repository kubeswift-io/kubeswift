      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: SwiftSandbox is an ephemeral OCI-rootfs microVM.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              SwiftSandboxSpec defines an ephemeral, strongly-isolated microVM that runs an
              OCI image as its root filesystem (the mode-3 sandbox boot: a direct-kernel
              boot + a read-only OCI rootfs + a tmpfs overlay). See
              docs/sandbox/overview.md.
            properties:
              args:
                description: |-
                  Args are appended to Command (or to the image entrypoint when Command is
                  empty).
                items:
                  type: string
                type: array
              command:
                description: |-
                  Command overrides the image's entrypoint. When empty, the image config
                  Entrypoint+Cmd is used.
                items:
                  type: string
                type: array
              cpu:
                default: 1
                description: CPU is the number of vCPUs.
                format: int32
                minimum: 1
                type: integer
              env:
                description: |-
                  Env are extra environment variables for the workload, merged over the image
                  config Env.
                items:
                  description: EnvVar represents an environment variable present in
                    a Container.
                  properties:
                    name:
                      description: |-
                        Name of the environment variable.
                        May consist of any printable ASCII characters except '='.
                      type: string
                    value:
                      description: |-
                        Variable references $(VAR_NAME) are expanded
                        using the previously defined environment variables in the container and
                        any service environment variables. If a variable cannot be resolved,
                        the reference in the input string will be unchanged. Double $$ are reduced
                        to a single $, which allows for escaping the $(VAR_NAME) syntax: i.e.
                        "$$(VAR_NAME)" will produce the string literal "$(VAR_NAME)".
                        Escaped references will never be expanded, regardless of whether the variable
                        exists or not.
                        Defaults to "".
                      type: string
                    valueFrom:
                      description: Source for the environment variable's value. Cannot
                        be used if value is not empty.
                      properties:
                        configMapKeyRef:
                          description: Selects a key of a ConfigMap.
                          properties:
                            key:
                              description: The key to select.
                              type: string
                            name:
                              default: ""
                              description: |-
                                Name of the referent.
                                This field is effectively required, but due to backwards compatibility is
                                allowed to be empty. Instances of this type with an empty value here are
                                almost certainly wrong.
                                More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                              type: string
                            optional:
                              description: Specify whether the ConfigMap or its key
                                must be defined
                              type: boolean
                          required:
                          - key
                          type: object
                          x-kubernetes-map-type: atomic
                        fieldRef:
                          description: |-
                            Selects a field of the pod: supports metadata.name, metadata.namespace, `metadata.labels['<KEY>']`, `metadata.annotations['<KEY>']`,
                            spec.nodeName, spec.serviceAccountName, status.hostIP, status.podIP, status.podIPs.
                          properties:
                            apiVersion:
                              description: Version of the schema the FieldPath is
                                written in terms of, defaults to "v1".
                              type: string
                            fieldPath:
                              description: Path of the field to select in the specified
                                API version.
                              type: string
                          required:
                          - fieldPath
                          type: object
                          x-kubernetes-map-type: atomic
                        fileKeyRef:
                          description: |-
                            FileKeyRef selects a key of the env file.
                            Requires the EnvFiles feature gate to be enabled.
                          properties:
                            key:
                              description: |-
                                The key within the env file. An invalid key will prevent the pod from starting.
                                The keys defined within a source may consist of any printable ASCII characters except '='.
                                During Alpha stage of the EnvFiles feature gate, the key size is limited to 128 characters.
                              type: string
                            optional:
                              default: false
                              description: |-
                                Specify whether the file or its key must be defined. If the file or key
                                does not exist, then the env var is not published.
                                If optional is set to true and the specified key does not exist,
                                the environment variable will not be set in the Pod's containers.

                                If optional is set to false and the specified key does not exist,
                                an error will be returned during Pod creation.
                              type: boolean
                            path:
                              description: |-
                                The path within the volume from which to select the file.
                                Must be relative and may not contain the '..' path or start with '..'.
                              type: string
                            volumeName:
                              description: The name of the volume mount containing
                                the env file.
                              type: string
                          required:
                          - key
                          - path
                          - volumeName
                          type: object
                          x-kubernetes-map-type: atomic
                        resourceFieldRef:
                          description: |-
                            Selects a resource of the container: only resources limits and requests
                            (limits.cpu, limits.memory, limits.ephemeral-storage, requests.cpu, requests.memory and requests.ephemeral-storage) are currently supported.
                          properties:
                            containerName:
                              description: 'Container name: required for volumes,
                                optional for env vars'
                              type: string
                            divisor:
                              anyOf:
                              - type: integer
                              - type: string
                              description: Specifies the output format of the exposed
                                resources, defaults to "1"
                              pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                              x-kubernetes-int-or-string: true
                            resource:
                              description: 'Required: resource to select'
                              type: string
                          required:
                          - resource
                          type: object
                          x-kubernetes-map-type: atomic
                        secretKeyRef:
                          description: Selects a key of a secret in the pod's namespace
                          properties:
                            key:
                              description: The key of the secret to select from.  Must
                                be a valid secret key.
                              type: string
                            name:
                              default: ""
                              description: |-
                                Name of the referent.
                                This field is effectively required, but due to backwards compatibility is
                                allowed to be empty. Instances of this type with an empty value here are
                                almost certainly wrong.
                                More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                              type: string
                            optional:
                              description: Specify whether the Secret or its key must
                                be defined
                              type: boolean
                          required:
                          - key
                          type: object
                          x-kubernetes-map-type: atomic
                      type: object
                  required:
                  - name
                  type: object
                type: array
              image:
                description: |-
                  Image is the OCI image to run as the sandbox root filesystem. A digest
                  reference (repo@sha256:...) is strongly preferred for reproducibility and
                  provenance; a tag is accepted.
                type: string
              imagePullSecret:
                description: |-
                  ImagePullSecret optionally names a docker-registry Secret in the sandbox's
                  namespace for pulling Image from a private registry.
                type: string
              kernelProfileRef:
                description: |-
                  KernelProfileRef names the SwiftKernel sandbox profile to boot. Defaults to
                  the well-known "sandbox" kernel when unset.
                properties:
                  name:
                    default: ""
                    description: |-
                      Name of the referent.
                      This field is effectively required, but due to backwards compatibility is
                      allowed to be empty. Instances of this type with an empty value here are
                      almost certainly wrong.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                    type: string
                type: object
                x-kubernetes-map-type: atomic
              memory:
                anyOf:
                - type: integer
                - type: string
                default: 512Mi
                description: Memory is the guest RAM (e.g. "512Mi", "4Gi").
                pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                x-kubernetes-int-or-string: true
              network:
                description: Network controls sandbox connectivity. Defaults to restricted.
                properties:
                  mode:
                    default: restricted
                    description: Mode is "restricted" (default), "open", or "none".
                    enum:
                    - restricted
                    - open
                    - none
                    type: string
                type: object
              nodeSelector:
                additionalProperties:
                  type: string
                description: NodeSelector constrains the sandbox to matching (kernel)
                  nodes.
                type: object
              poolRef:
                description: |-
                  PoolRef, when set, satisfies this sandbox from a warm SwiftSandboxPool of the
                  same image (sub-second checkout: claim a pre-booted slot and inject this
                  sandbox's command/args/env into it over vsock) instead of the cold
                  materialize+boot path. If no warm slot is available the sandbox falls back to
                  the cold path automatically. The pool must be in the same namespace.
                properties:
                  name:
                    default: ""
                    description: |-
                      Name of the referent.
                      This field is effectively required, but due to backwards compatibility is
                      allowed to be empty. Instances of this type with an empty value here are
                      almost certainly wrong.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                    type: string
                type: object
                x-kubernetes-map-type: atomic
              rootfsMode:
                allOf:
                - enum:
                  - block
                  - virtiofs
                - enum:
                  - block
                  - virtiofs
                default: block
                description: |-
                  RootfsMode selects how the OCI rootfs is delivered to the guest:
                    block    (default) — a node-local read-only ext4 image passed as a
                                          virtio-blk disk; the bridge overlays a tmpfs upper.
                    virtiofs           — the unpacked rootfs tree shared over virtio-fs
                                          (tag "sandboxroot"); no ext4 sizing/mkfs, and the
                                          host page cache is shared. Same RO-base + writable
                                          tmpfs-overlay semantics as block.
                type: string
              timeout:
                description: |-
                  Timeout is the wall-clock run cap. Past startedAt+timeout the controller
                  force-terminates the sandbox to Failed(DeadlineExceeded). Unset = no cap.
                type: string
              ttl:
                description: |-
                  TTL, when set, makes the controller delete this SwiftSandbox once it has
                  been terminal (Completed/Failed) for at least ttl — keeping finished
                  sandboxes from accumulating. Unset = keep until manual deletion.
                type: string
              verifyKeySecretRef:
                description: |-
                  VerifyKeySecretRef, when set, names a Secret in the sandbox's namespace
                  holding a cosign public key (key "cosign.pub"). Before materializing the
                  rootfs, sandbox-materialize cosign-verifies Image@digest against that key;
                  a missing or invalid signature fails the materialize step, so the sandbox
                  goes Failed and NEVER boots. Requires a TLS registry (cosign speaks HTTPS
                  only). Mirrors SwiftImage's spec.source.oci.verifyKeySecretRef.
                properties:
                  name:
                    description: Name of the Secret.
                    type: string
                required:
                - name
                type: object
              workingDir:
                description: WorkingDir overrides the image config working directory.
                type: string
            required:
            - image
            - memory
            type: object
          status:
            description: SwiftSandboxStatus is the observed state.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              exitCode:
                description: ExitCode is the workload/guest exit code when known.
                format: int32
                type: integer
              message:
                type: string
              network:
                description: |-
                  Network is the guest network (primaryIP), reported by the swiftletd lease
                  poller. Absent for network:none sandboxes.
                properties:
                  primaryIP:
                    description: PrimaryIP is the guest's DHCP-assigned IP (network:restricted
                      only).
                    type: string
                type: object
              nodeName:
                type: string
              phase:
                description: SwiftSandboxPhase is the lifecycle phase.
                enum:
                - Pending
                - Materializing
                - Running
                - Completed
                - Failed
                type: string
              podRef:
                description: PodRef is the launcher pod name.
                type: string
              rootfs:
                description: SandboxRootfsStatus reports the materialized OCI rootfs.
                properties:
                  cachePath:
                    description: CachePath is the node-local rootfs artifact path.
                    type: string
                  digest:
                    description: Digest is the resolved image digest (sha256:...).
                    type: string
                  sizeBytes:
                    description: SizeBytes is the materialized ext4 (or tree) size.
                    format: int64
                    type: integer
                type: object
              runtime:
                description: Runtime is the live guest runtime (pid/hypervisor), reported
                  by swiftletd.
                properties:
                  hypervisor:
                    description: Hypervisor is the resolved VMM (always cloud-hypervisor
                      for a sandbox).
                    type: string
                  pid:
                    description: PID is the host PID of the hypervisor process.
                    format: int64
                    type: integer
                type: object
              startedAt:
                description: StartedAt is when the guest began running.
                format: date-time
                type: string
              terminalAt:
                description: |-
                  TerminalAt is when the sandbox first reached a terminal phase
                  (Completed/Failed); the anchor for spec.ttl-driven deletion.
                format: date-time
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
