# Default values for kubeswift.
# Install: helm install kubeswift oci://ghcr.io/projectbeskar/charts/kubeswift --version <version> --create-namespace

# Namespace for KubeSwift resources. Use --create-namespace or pre-create the namespace.
namespace: kubeswift-system

# Create namespace if it does not exist. Set to false to use helm install --create-namespace instead.
createNamespace: false

controllerManager:
  image:
    registry: ghcr.io/projectbeskar/kubeswift
    # Default "latest" is overridden by chart to match published tags (vX.Y.Z or sha-xxx for dev).
    # Set explicitly for local builds: tag: latest
    tag: latest
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

swiftletd:
  # DaemonSet: disabled by default. swiftletd is designed to run only inside SwiftGuest pods
  # (as the launcher container). A standalone DaemonSet has no runtime intent and will crash.
  daemonset:
    enabled: false
  image:
    registry: ghcr.io/projectbeskar/kubeswift
    # Same as controllerManager; use tag: latest for local build+load.
    tag: latest
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 2
      memory: 2Gi

# Admission webhooks (optional). Requires cert-manager. When enabled, controller-manager runs with --webhook-enabled=true.
webhook:
  enabled: false
