# Default values for kubeswift.
# Install: helm install kubeswift oci://ghcr.io/projectbeskar/charts/kubeswift --version <version> --create-namespace

# Namespace for KubeSwift resources. Use --create-namespace or pre-create the namespace.
namespace: kubeswift-system

# Create namespace if it does not exist. Set to false to use helm install --create-namespace instead.
createNamespace: false

controllerManager:
  image:
    registry: ghcr.io/projectbeskar/kubeswift
    # Default "latest" is overridden by chart to match published tags (vX.Y.Z or sha-xxx for dev).
    # Set explicitly for local builds: tag: latest
    tag: latest
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

swiftletd:
  # DaemonSet: disabled by default. swiftletd is designed to run only inside SwiftGuest pods
  # (as the launcher container). A standalone DaemonSet has no runtime intent and will crash.
  daemonset:
    enabled: false
  image:
    registry: ghcr.io/projectbeskar/kubeswift
    # Same as controllerManager; use tag: latest for local build+load.
    tag: latest
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 2
      memory: 2Gi

# snapshot-s3: the uploader/downloader image for the Tier C (s3 / object-storage)
# snapshot backend. The controller passes this to the per-snapshot upload Job and
# the per-restore download Job via the KUBESWIFT_SNAPSHOT_S3_IMAGE env var. No
# separate workload is deployed for it; this only sets the image reference.
snapshotS3:
  image:
    registry: ghcr.io/projectbeskar/kubeswift
    # Same as controllerManager; use tag: latest for local build+load.
    tag: latest

# migration-stunnel: the mTLS sidecar image for cross-node live migration
# (Phase 3c). The controller injects it into launcher pods when
# migration.mtls.enabled=true, reading KUBESWIFT_MIGRATION_STUNNEL_IMAGE.
# No separate workload is deployed; this only sets the image reference.
migrationStunnel:
  image:
    registry: ghcr.io/projectbeskar/kubeswift
    # Same as controllerManager; use tag: latest for local build+load.
    tag: latest

# GPU discovery DaemonSet: auto-discovers GPU hardware on nodes labeled kubeswift.io/gpu-node=true.
# Populates SwiftGPUNode status with GPU inventory, NUMA topology, and Fabric Manager state.
# This is the NATIVE GPU backend's discovery (SwiftGPUProfile / SwiftGPUNode). It is
# INDEPENDENT of the DRA backend below — leave it off for DRA-only clusters.
gpuDiscovery:
  enabled: false
  image:
    registry: ghcr.io/projectbeskar/kubeswift
    tag: latest
  interval: "60s"
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

# DRA GPU driver DaemonSet: the reference Dynamic Resource Allocation driver
# (driver name gpu.kubeswift.io) for the DRA GPU backend (SwiftGuest
# spec.gpuResourceClaim). Runs on nodes labeled kubeswift.io/gpu-node=true; it
# does its OWN GPU discovery (publishes ResourceSlices), so it is INDEPENDENT of
# gpuDiscovery above — a DRA-only cluster runs dra.enabled=true with
# gpuDiscovery.enabled=false. Node prerequisites: CDI enabled in the container
# runtime + the vfio-pci module loaded. See docs/gpu/dra-allocation.md.
dra:
  enabled: false
  image:
    registry: ghcr.io/projectbeskar/kubeswift
    tag: latest
  # The cluster-scoped DeviceClass a ResourceClaim references. Set create=false
  # if you manage the DeviceClass out-of-band (e.g. shared across installs).
  deviceClass:
    create: true
    name: kubeswift-vfio-gpu
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

# UI backend gateway (the browser-facing Connect hub for a separate kubeswift-ui
# app). Opt-in. Runs in a hub cluster, watches fleet.kubeswift.io Cluster
# objects, and fans the read plane across the registered member clusters.
# See docs/ui/gateway.md and docs/design/ui-backend-enablement.md.
gateway:
  enabled: false
  image:
    registry: ghcr.io/projectbeskar/kubeswift
    # Same as controllerManager; use tag: latest for local build+load.
    tag: latest
  replicas: 1
  port: 8080
  # End-user auth (decision D1):
  #   oidc     - verify the browser's IdP-issued OIDC ID token (gateway.oidc
  #              below) and impersonate the claim-derived user+groups on each
  #              member. The production path with a shared IdP (e.g. Keycloak).
  #   token    - impersonate the bearer-token user via the hub's TokenReview.
  #              The fleet should share an OIDC identity provider so the
  #              impersonated subject authorizes uniformly on each member.
  #   insecure - member queries run as the gateway's own credential, with NO
  #              per-user impersonation. DEV/LAB ONLY: every UI user inherits
  #              whatever the member credentials grant. Do not use in production.
  authMode: insecure
  # OIDC settings (used only when authMode=oidc). The gateway verifies the
  # browser-supplied ID token against issuerURL's JWKS and impersonates the
  # claim-derived user+groups onto each member. issuerURL must resolve to ONE URL
  # reachable from BOTH the browser and the gateway (see docs/ui/auth.md). Mirror
  # these into the UI via ui.oidc so the browser logs in against the same issuer.
  oidc:
    issuerURL: "" # e.g. https://keycloak.example.com/realms/kubeswift
    clientID: "" # the OIDC client ID / audience the ID token must carry
    usernameClaim: email # claim used as the impersonated username
    groupsClaim: groups # claim used as the impersonated groups
    usernamePrefix: "" # mirrors apiserver --oidc-username-prefix
    groupsPrefix: "" # mirrors apiserver --oidc-groups-prefix
    # caSecret: trust a private/self-signed IdP CA for the JWKS fetch. Name a
    # Secret in .Values.namespace holding the PEM at key caKey; the gateway mounts
    # it and passes --oidc-ca-file. Empty = system roots only.
    caSecret: ""
    caKey: ca.crt
  # Browser origin allowed to call the Connect/gRPC-Web surface (the kubeswift-ui
  # app's origin). "*" is acceptable for a token-auth API (no cookies); pin it
  # for a hardened install. With ui.gateway.mode=proxy the browser is same-origin,
  # so CORS does not apply.
  corsAllowOrigin: "*"
  service:
    type: ClusterIP
    port: 8080
  ingress:
    enabled: false
    className: ""
    host: kubeswift-gateway.example.com
    annotations: {}
    tls: []
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi

# Admission webhooks (optional). Requires cert-manager. When enabled, controller-manager runs with --webhook-enabled=true.
webhook:
  enabled: false

# Observability (optional). Requires the Prometheus Operator CRDs
# (monitoring.coreos.com — e.g. kube-prometheus-stack) when enabled; the
# dashboards additionally need a Grafana with the dashboard sidecar (the
# kube-prometheus-stack default). Off by default — default installs incur
# no monitoring CRD dependency. See docs/design/observability.md.
monitoring:
  enabled: false
  # ServiceMonitor scraping the controller-manager /metrics endpoint.
  serviceMonitor:
    enabled: true
    interval: 30s
    # Extra labels for Prometheus instances that select ServiceMonitors by
    # label (e.g. release: kube-prometheus-stack).
    additionalLabels: {}
  # Grafana dashboards as sidecar-discovered ConfigMaps.
  dashboards:
    enabled: true
    # The sidecar discovery label (kube-prometheus-stack default shown).
    label: grafana_dashboard
    # Namespace for the dashboard ConfigMaps. Empty = the KubeSwift
    # namespace; set this to your Grafana namespace if the sidecar only
    # watches its own namespace (its default).
    namespace: ""
    # Extra annotations, e.g. grafana_folder: KubeSwift
    annotations: {}
  # Starter PrometheusRule alert pack (warning-biased; see
  # docs/observability/alerts.md).
  prometheusRule:
    enabled: true
    # Extra labels for Prometheus instances that select rules by label.
    additionalLabels: {}

# Live migration settings.
migration:
  # mTLS transport for cross-node live migration (Phase 3c, Option B per-node
  # identity). When enabled the chart provisions a per-namespace cert-manager
  # PKI (selfSigned Issuer -> CA -> CA Issuer) in .Values.namespace and the
  # controller-manager runs with --migration-mtls-enabled=true (issues one
  # leaf Certificate per worker node). Requires cert-manager installed
  # cluster-side. Off by default — default clusters incur no cert-manager
  # dependency and no behavior change.
  mtls:
    enabled: false
