name: CI

# Opt into Node.js 24 for JavaScript actions (Node 20 deprecated, default switches June 2026)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
    paths:
      - '**.go'
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - 'api/**'
      - 'config/crd/**'
      - 'images/**'
      - 'rust/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - '**.go'
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - 'api/**'
      - 'config/crd/**'
      - 'images/**'
      - 'rust/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/**'

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Check formatting
        run: 'test -z "$(gofmt -s -l .)" || (echo "Code not formatted. Run: go fmt ./..."; gofmt -s -l .; exit 1)'

      - name: Build
        run: go build ./cmd/...

      - name: Test
        run: go test ./...

  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check formatting
        run: cd rust && cargo fmt --check

      - name: Build
        run: cd rust && cargo build

      - name: Test
        run: cd rust && cargo test

  generate:
    name: Generate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Install controller-gen
        run: go install sigs.k8s.io/controller-tools/cmd/controller-gen@v0.20.1

      - name: Generate
        run: |
          export PATH="$(go env GOPATH)/bin:$PATH"
          make generate

      - name: Check for uncommitted changes
        run: |
          if ! git diff --exit-code config/crd/bases/ api/; then
            echo "Generated code is out of date. Run: make generate"
            exit 1
          fi

  swiftletd-image:
    name: swiftletd image
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build swiftletd image
        uses: docker/build-push-action@v6
        with:
          context: ./rust
          file: ./images/swiftletd/Containerfile
          push: false
          load: true
