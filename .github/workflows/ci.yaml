name: CI

# Opt into Node.js 24 for JavaScript actions (Node 20 deprecated, default switches June 2026)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
    paths:
      - '**.go'
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - 'api/**'
      - 'config/crd/**'
      - 'images/**'
      - 'rust/**'
      - 'go.mod'
      - 'go.sum'
      - 'test/**'
      - 'Makefile'
      - 'proto/**'
      - 'gen/**'
      - 'buf.yaml'
      - 'buf.gen.yaml'
      - 'config/grafana/**'
      - 'tools/lint-dashboards.sh'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - '**.go'
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - 'api/**'
      - 'config/crd/**'
      - 'images/**'
      - 'rust/**'
      - 'go.mod'
      - 'go.sum'
      - 'test/**'
      - 'Makefile'
      - 'proto/**'
      - 'gen/**'
      - 'buf.yaml'
      - 'buf.gen.yaml'
      - 'config/grafana/**'
      - 'tools/lint-dashboards.sh'
      - '.github/workflows/**'

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Check formatting
        run: 'test -z "$(gofmt -s -l .)" || (echo "Code not formatted. Run: go fmt ./..."; gofmt -s -l .; exit 1)'

      - name: Build
        run: go build ./cmd/...

      - name: Test
        run: go test ./...

  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check formatting
        run: cd rust && cargo fmt --check

      - name: Build
        run: cd rust && cargo build

      - name: Test
        run: cd rust && cargo test

  generate:
    name: Generate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Install controller-gen
        run: go install sigs.k8s.io/controller-tools/cmd/controller-gen@v0.20.1

      - name: Generate
        run: |
          export PATH="$(go env GOPATH)/bin:$PATH"
          make generate

      - name: Check for uncommitted changes
        run: |
          if ! git diff --exit-code config/crd/bases/ api/; then
            echo "Generated code is out of date. Run: make generate"
            exit 1
          fi

  proto:
    name: Proto
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Set up buf
        uses: bufbuild/buf-setup-action@v1
        with:
          version: 1.71.0
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint
        run: buf lint

      # Breaking-change gate against the contract on main. On the bootstrap PR
      # (main has no buf.yaml yet) the guard skips it; every later PR enforces
      # it so the UI repo's pinned contract never breaks underneath it.
      - name: Breaking change check (vs main)
        run: |
          git fetch --no-tags --depth=1 origin main
          if git cat-file -e FETCH_HEAD:buf.yaml 2>/dev/null; then
            buf breaking --against '.git#ref=FETCH_HEAD'
          else
            echo "main has no buf.yaml yet (bootstrap); skipping breaking check"
          fi

      # Same discipline as the generate job: regenerate and fail on drift, so
      # gen/ in the repo always matches proto/.
      - name: Verify generated code is up to date
        run: |
          make proto BUF=buf
          if ! git diff --exit-code gen/; then
            echo "Generated proto code is out of date. Run: make proto"
            exit 1
          fi

  e2e-scripts:
    name: E2E script syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Static check (bash -n) of every script under test/. Catches typos,
      # unclosed quotes, syntax-level breakage on every PR. Does NOT run
      # the scripts against a cluster — that's the workflow_dispatch
      # `cluster-e2e` job in e2e-on-cluster.yaml.
      #
      # This job exists because the cluster-side e2e suite (snapshot-test,
      # local-roundtrip-test, etc.) sits behind a path-touch trigger and
      # is rare to invoke; if a script gets corrupted between runs no one
      # notices until someone tries to run it manually. PR #21 surfaced
      # the broader pattern: e2es exist, never run, bugs accumulate.
      # bash -n on every PR keeps the suite from rotting silently.
      - name: bash -n every test script
        run: make verify-e2e-scripts

  dashboards:
    name: Dashboard lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Provisioning-native hygiene for config/grafana/*.json: no
      # __inputs blocks, no ${DS_*} import placeholders, stable uids,
      # a defaulted `datasource` templating variable. Import-style JSON
      # renders on manual import but silently shows "no data" under
      # sidecar/ConfigMap provisioning (the Helm monitoring.dashboards
      # path).
      - name: Lint Grafana dashboards
        run: make verify-dashboards

  swiftletd-image:
    name: swiftletd image
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build swiftletd image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./images/swiftletd/Containerfile
          push: false
          load: true

  migration-stunnel-image:
    name: migration-stunnel image
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build migration-stunnel image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./images/migration-stunnel/Containerfile
          push: false
          load: true

  gateway-image:
    name: kubeswift-gateway image
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build kubeswift-gateway image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./images/kubeswift-gateway/Containerfile
          push: false
          load: true
