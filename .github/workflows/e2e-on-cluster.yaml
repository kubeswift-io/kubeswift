name: E2E (cluster)

# Cluster-side end-to-end tests. Runs the existing test/ scripts against
# a kind cluster with snapshot-capable CSI installed. These scripts boot
# real Cloud-Hypervisor VMs and exercise the full SwiftSnapshot /
# SwiftRestore lifecycle — they are what would have caught the Tier A
# data-loss bug fixed in PR #21 had they been wired into CI.
#
# Initial scope (this commit):
#   - workflow_dispatch (manual): maintainers can trigger ad hoc against
#     a kind cluster on a hosted runner. The job is self-contained
#     (kind setup, CSI driver install, KubeSwift deploy, e2e runs).
#   - schedule (nightly): runs the same path overnight to surface
#     regressions within 24 hours.
#
# NOT YET wired:
#   - pull_request path-touch triggers. Hosted-runner KVM + cloud-image
#     download per PR is heavy and the kind+CSI setup is new ground;
#     stabilize the manual + nightly runs first, then add PR triggers
#     in a follow-up. Path-touch on
#     internal/controller/{swiftrestore,swiftguest,swiftsnapshot}/**
#     and rust/** is the documented next step.
#
# See docs/testing/e2e-audit.md for the full e2e suite inventory.

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: "Which e2e to run (default: all)"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - smoke
          - snapshot
          - clonestrategy
          - local-roundtrip
          - local-clone-identity
  schedule:
    # Daily at 04:00 UTC. Surface regressions before working hours
    # without flooding the runner pool.
    - cron: "0 4 * * *"

permissions:
  contents: read

jobs:
  cluster-e2e:
    name: Cluster e2e
    runs-on: ubuntu-latest
    timeout-minutes: 90
    # IMAGE_TAG=dev is intentionally NOT a job-level env. It is scoped to
    # only the build/load/deploy steps below. The upstream
    # csi-driver-host-path deploy script reads IMAGE_TAG to override BOTH
    # its sidecar RBAC refs AND its sidecar image tags; a job-wide
    # IMAGE_TAG=dev makes that step fetch a non-existent `dev` RBAC ref and
    # pull non-existent `:dev` sidecar images (hang at "waiting for hostpath
    # deployment to complete"). Default-to-explicit per Design Principle #10.
    steps:
      - uses: actions/checkout@v6

      # Hosted ubuntu-latest runners ship with only ~14 GB free on /. The
      # disk-boot scenario imports a 40 GiB raw Ubuntu Noble image onto the
      # kind worker's csi-hostpath volume — which IS the runner's own root
      # filesystem — after downloading the ~600 MB cloud image. The full
      # five-scenario smoke blew the disk ("Free space left: 0 MB"). Reclaim
      # the preinstalled toolchains we don't use (Android SDK alone is ~9 GB)
      # so even the single disk-boot import has headroom. Runs BEFORE setup-go
      # so clearing hostedtoolcache can't delete the Go we then install.
      - name: Reclaim disk space
        run: |
          echo "Disk before reclaim:"; df -h /
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /opt/ghc /usr/local/.ghcup || true
          sudo rm -rf /usr/share/swift || true
          sudo docker image prune -af || true
          echo "Disk after reclaim:"; df -h /

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      # KVM acceleration is required for Cloud Hypervisor to boot the
      # real Ubuntu Noble cloud images the smoke-test and snapshot-test
      # scripts use. GitHub-hosted ubuntu-latest runners have /dev/kvm
      # available since 2024; verify it explicitly so the failure mode
      # is "KVM unavailable" instead of an opaque CH crash.
      - name: Verify KVM availability
        run: |
          if [ ! -e /dev/kvm ]; then
            echo "::error::/dev/kvm is not present on this runner. Cluster e2e cannot run without KVM."
            exit 1
          fi
          ls -l /dev/kvm

      - name: Install kind
        run: |
          curl -fsSLo kind https://kind.sigs.k8s.io/dl/v0.24.0/kind-linux-amd64
          chmod +x kind
          sudo mv kind /usr/local/bin/

      - name: Create kind cluster
        run: |
          kind create cluster --name kubeswift-e2e --config - <<'EOF'
          kind: Cluster
          apiVersion: kind.x-k8s.io/v1alpha4
          nodes:
            - role: control-plane
            - role: worker
          EOF

      # Snapshot CRDs (the snapshot-controller side; the host-path CSI
      # driver below provides the storage-side implementation).
      - name: Install snapshot CRDs
        run: |
          kubectl apply -f https://raw.githubusercontent.com/kubernetes-csi/external-snapshotter/v8.0.1/client/config/crd/snapshot.storage.k8s.io_volumesnapshotclasses.yaml
          kubectl apply -f https://raw.githubusercontent.com/kubernetes-csi/external-snapshotter/v8.0.1/client/config/crd/snapshot.storage.k8s.io_volumesnapshotcontents.yaml
          kubectl apply -f https://raw.githubusercontent.com/kubernetes-csi/external-snapshotter/v8.0.1/client/config/crd/snapshot.storage.k8s.io_volumesnapshots.yaml

      - name: Install snapshot controller
        run: |
          kubectl apply -f https://raw.githubusercontent.com/kubernetes-csi/external-snapshotter/v8.0.1/deploy/kubernetes/snapshot-controller/rbac-snapshot-controller.yaml
          kubectl apply -f https://raw.githubusercontent.com/kubernetes-csi/external-snapshotter/v8.0.1/deploy/kubernetes/snapshot-controller/setup-snapshot-controller.yaml
          kubectl -n kube-system rollout status deploy/snapshot-controller --timeout=2m

      # csi-driver-host-path is the reference snapshot-capable CSI
      # driver. It's lightweight (no real backing storage), correct
      # enough for snapshot semantics, and has a default
      # VolumeSnapshotClass annotation so snapshot-test.sh's
      # auto-detection finds it.
      - name: Install csi-driver-host-path
        run: |
          git clone --depth=1 --branch v1.15.0 https://github.com/kubernetes-csi/csi-driver-host-path /tmp/csi-host-path
          # Root cause is an env-leak interaction, not a transient flake.
          # deploy-hostpath.sh defaults UPDATE_RBAC_RULES=true, which makes its
          # rbac_version() OVERRIDE each sidecar's RBAC ref with the IMAGE_TAG
          # env var (deploy-hostpath.sh: `eval version=...${IMAGE_TAG:-$version}`).
          # This job sets IMAGE_TAG=dev (for the KubeSwift images), so the
          # script fetches e.g. external-provisioner/dev/deploy/kubernetes/rbac.yaml
          # — a 404 (no `dev` branch exists upstream). The fetch used
          # `--silent --location` with no `--fail`, so the 404 body landed in
          # rbac.yaml and kustomize aborted with "missing Resource metadata:
          # file is not directory".
          #
          # Fix: UPDATE_RBAC_RULES=false pins rbac_version() to the release tag
          # baked into the local hostpath manifests (v5.1.0 etc.), which return
          # 200, and severs the IMAGE_TAG=dev leak into the CSI deploy script.
          export UPDATE_RBAC_RULES=false
          # Defense-in-depth: also harden the one fragile curl so any genuine
          # fetch error is loud (non-zero exit) rather than a silent bad body.
          # `--silent --location` is unique to that curl (the only other fetch
          # uses `wget --quiet`).
          sed -i 's/--silent --location/--silent --location --fail --retry 5 --retry-delay 5 --retry-all-errors --remove-on-error/' \
            /tmp/csi-host-path/deploy/util/deploy-hostpath.sh
          # Outer retry is a belt-and-suspenders safety net (deploy.sh re-fetch
          # + re-apply is idempotent) in case something beyond the RBAC fetch
          # hiccups.
          ok=false
          for attempt in 1 2 3; do
            if /tmp/csi-host-path/deploy/kubernetes-latest/deploy.sh; then
              ok=true; break
            fi
            echo "deploy.sh attempt $attempt failed; retrying in 20s..."
            sleep 20
          done
          if [ "$ok" != true ]; then
            echo "::error::csi-driver-host-path deploy.sh failed after 3 attempts"
            exit 1
          fi
          kubectl apply -f /tmp/csi-host-path/examples/csi-storageclass.yaml
          # deploy.sh already creates the csi-hostpath-snapclass VolumeSnapshotClass;
          # the standalone examples/csi-snapshotclass.yaml was removed upstream
          # (renamed to csi-volumesnapshotclass.yaml). No separate apply needed.
          # Mark the snapshot class default so snapshot-test.sh auto-detects it.
          kubectl annotate volumesnapshotclass csi-hostpath-snapclass \
            snapshot.storage.kubernetes.io/is-default-class=true

      # IMAGE_TAG=dev scoped to this step only (see job-level note above).
      # Makefile default is sha-<git-short-hash> (IMAGE_TAG ?= ...); pinning
      # :dev here keeps build-images, the kind load below, and deploy aligned.
      - name: Build and load images
        env:
          IMAGE_TAG: dev
        run: |
          make build-images
          kind load docker-image \
            ghcr.io/projectbeskar/kubeswift/controller-manager:dev \
            ghcr.io/projectbeskar/kubeswift/swiftletd:dev \
            ghcr.io/projectbeskar/kubeswift/gpu-discovery:dev \
            --name kubeswift-e2e

      - name: Deploy KubeSwift
        env:
          IMAGE_TAG: dev
        run: |
          make deploy
          kubectl -n kubeswift-system rollout status deploy/controller-manager --timeout=5m

      # Hosted-runner capacity: the launcher pod is Guaranteed QoS with
      # cpu request==limit==guest cpu (internal/controller/swiftguest/pod.go).
      # The default guest class is cpu:"2", which does NOT schedule on a
      # 4-vCPU kind worker already running kube-system + snapshot-controller
      # + csi-hostpath + the KubeSwift controller (the disk-boot guest sat
      # Pending "Insufficient cpu"). Shrink the checked-out sample to cpu:"1"
      # so the single smoke VM fits. boot-test.sh's apply_shared re-applies
      # this file from disk, so the edit is honoured. Local to the runner
      # checkout only — never committed.
      - name: Shrink default guest class for hosted-runner capacity
        run: |
          sed -i 's/cpu: "2"/cpu: "1"/' config/samples/shared/swiftguestclass-default.yaml
          grep -n 'cpu:' config/samples/shared/swiftguestclass-default.yaml

      - name: Run e2e ${{ github.event.inputs.scenario || 'all' }}
        run: |
          set -euo pipefail
          SCENARIO="${{ github.event.inputs.scenario || 'all' }}"
          run_one() {
            echo "::group::e2e: $1"
            make "$1"
            echo "::endgroup::"
          }
          case "$SCENARIO" in
            smoke)
              # Hosted-runner honest smoke: ONE real Cloud Hypervisor VM
              # (disk-boot) booted under nested KVM. The full `make smoke-test`
              # runs five scenarios, each downloading its own ~40 GiB image —
              # that exhausts the runner's disk and 4 vCPUs. Run just disk-boot
              # here. The multi-scenario suite (and the snapshot/clonestrategy/
              # local-* cluster e2e below) each boot their own VMs and need a
              # self-hosted runner with more headroom — tracked as the next
              # layer of this workflow's hardening.
              echo "::group::e2e: smoke (disk-boot only)"
              test/smoke/boot-test.sh --scenario disk-boot
              echo "::endgroup::"
              ;;
            snapshot)            run_one snapshot-test ;;
            clonestrategy)       run_one clonestrategy-test ;;
            local-roundtrip)     run_one local-roundtrip-test ;;
            local-clone-identity) run_one local-clone-identity-test ;;
            all)
              run_one snapshot-test
              run_one clonestrategy-test
              # The Tier B local-* scripts need a node with KVM AND
              # /var/lib/kubeswift/snapshots/ writable hostPath. Both
              # are present on kind workers; if a future runner image
              # changes that, these scripts will fail loudly rather
              # than silently.
              run_one local-roundtrip-test
              run_one local-clone-identity-test
              # Smoke-test runs last because it's the heaviest (boots
              # five guests across scenarios) and a failure earlier in
              # the chain is more informative for debugging.
              run_one smoke-test
              ;;
            *)
              echo "::error::unknown scenario: $SCENARIO"
              exit 2
              ;;
          esac

      - name: Diagnostic dump on failure
        if: failure()
        run: |
          echo "::group::cluster state"
          kubectl get all -A
          echo "::endgroup::"
          echo "::group::events"
          kubectl get events -A --sort-by=.lastTimestamp | tail -100
          echo "::endgroup::"
          echo "::group::controller-manager logs"
          kubectl -n kubeswift-system logs deploy/controller-manager --tail=200 || true
          echo "::endgroup::"
          for guest in $(kubectl get pod -A -l 'swift.kubeswift.io/guest' -o name 2>/dev/null); do
            echo "::group::launcher $guest"
            kubectl logs $guest --tail=100 || true
            echo "::endgroup::"
          done

      - name: Cleanup kind
        if: always()
        run: kind delete cluster --name kubeswift-e2e || true
