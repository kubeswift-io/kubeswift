name: Release RC

on:
  push:
    tags:
      - 'v*.*.*-rc.*'

permissions:
  contents: write   # create the GitHub pre-release
  packages: write
  id-token: write   # keyless cosign signing (Sigstore OIDC)

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/projectbeskar/kubeswift
  CHART_OCI_PUSH: oci://ghcr.io/projectbeskar/charts
  CHART_OCI_INSTALL: oci://ghcr.io/projectbeskar/charts/kubeswift

jobs:
  build-and-push:
    name: Build and push images + chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set version from tag
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "git_commit=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push controller-manager
        id: build-controller-manager
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./images/controller-manager/Containerfile
          push: true
          # SLSA build provenance + SPDX SBOM, attached to the image in the
          # registry by BuildKit (no GitHub attestation store dependency -- that
          # requires Enterprise on private repos).
          provenance: mode=max
          sbom: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/controller-manager:${{ steps.version.outputs.tag }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            GIT_COMMIT=${{ steps.version.outputs.git_commit }}
            BUILD_DATE=${{ steps.version.outputs.build_date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push gpu-discovery
        id: build-gpu-discovery
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./images/gpu-discovery/Containerfile
          push: true
          # SLSA build provenance + SPDX SBOM, attached to the image in the
          # registry by BuildKit (no GitHub attestation store dependency -- that
          # requires Enterprise on private repos).
          provenance: mode=max
          sbom: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/gpu-discovery:${{ steps.version.outputs.tag }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            GIT_COMMIT=${{ steps.version.outputs.git_commit }}
            BUILD_DATE=${{ steps.version.outputs.build_date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


      - name: Build and push kubeswift-dra-driver
        id: build-dra-driver
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./images/kubeswift-dra-driver/Containerfile
          push: true
          provenance: mode=max
          sbom: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/kubeswift-dra-driver:${{ steps.version.outputs.tag }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            GIT_COMMIT=${{ steps.version.outputs.git_commit }}
            BUILD_DATE=${{ steps.version.outputs.build_date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push snapshot-s3
        id: build-snapshot-s3
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./images/snapshot-s3/Containerfile
          push: true
          # SLSA build provenance + SPDX SBOM, attached to the image in the
          # registry by BuildKit (no GitHub attestation store dependency -- that
          # requires Enterprise on private repos).
          provenance: mode=max
          sbom: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/snapshot-s3:${{ steps.version.outputs.tag }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            GIT_COMMIT=${{ steps.version.outputs.git_commit }}
            BUILD_DATE=${{ steps.version.outputs.build_date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push swiftletd
        id: build-swiftletd
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./images/swiftletd/Containerfile
          push: true
          # SLSA build provenance + SPDX SBOM, attached to the image in the
          # registry by BuildKit (no GitHub attestation store dependency -- that
          # requires Enterprise on private repos).
          provenance: mode=max
          sbom: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/swiftletd:${{ steps.version.outputs.tag }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            GIT_COMMIT=${{ steps.version.outputs.git_commit }}
            BUILD_DATE=${{ steps.version.outputs.build_date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push migration-stunnel
        id: build-migration-stunnel
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./images/migration-stunnel/Containerfile
          push: true
          # SLSA build provenance + SPDX SBOM, attached to the image in the
          # registry by BuildKit (no GitHub attestation store dependency -- that
          # requires Enterprise on private repos).
          provenance: mode=max
          sbom: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/migration-stunnel:${{ steps.version.outputs.tag }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            GIT_COMMIT=${{ steps.version.outputs.git_commit }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      # Keyless signing: the signing identity is THIS workflow run's GitHub
      # OIDC identity (repo + workflow path + tag ref); the signature and
      # certificate are stored alongside the image in GHCR and logged in the
      # Rekor transparency log. Verify with:
      #   cosign verify <image>@<digest> \
      #     --certificate-identity-regexp 'https://github.com/projectbeskar/kubeswift/\.github/workflows/release-(stable|rc)\.yaml@.*' \
      #     --certificate-oidc-issuer https://token.actions.githubusercontent.com
      - name: Sign images (cosign keyless)
        env:
          COSIGN_YES: "true"
        run: |
          cosign sign "${{ env.IMAGE_PREFIX }}/controller-manager@${{ steps.build-controller-manager.outputs.digest }}"
          cosign sign "${{ env.IMAGE_PREFIX }}/gpu-discovery@${{ steps.build-gpu-discovery.outputs.digest }}"
          cosign sign "${{ env.IMAGE_PREFIX }}/snapshot-s3@${{ steps.build-snapshot-s3.outputs.digest }}"
          cosign sign "${{ env.IMAGE_PREFIX }}/kubeswift-dra-driver@${{ steps.build-dra-driver.outputs.digest }}"
          cosign sign "${{ env.IMAGE_PREFIX }}/swiftletd@${{ steps.build-swiftletd.outputs.digest }}"
          cosign sign "${{ env.IMAGE_PREFIX }}/migration-stunnel@${{ steps.build-migration-stunnel.outputs.digest }}"

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.0

      - name: Configure Helm for OCI
        run: helm registry login ${{ env.REGISTRY }} -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}

      - name: Package and push chart
        id: chart
        run: |
          helm package charts/kubeswift --version ${{ steps.version.outputs.version }} --app-version ${{ steps.version.outputs.version }}
          helm push kubeswift-${{ steps.version.outputs.version }}.tgz ${{ env.CHART_OCI_PUSH }} 2>&1 | tee chart-push.log
          DIGEST=$(grep -o 'sha256:[a-f0-9]*' chart-push.log | head -1)
          test -n "$DIGEST"   # fail loud if helm stops printing the digest
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      - name: Sign chart (cosign keyless)
        env:
          COSIGN_YES: "true"
        run: cosign sign "ghcr.io/projectbeskar/charts/kubeswift@${{ steps.chart.outputs.digest }}"

      # Create the GitHub pre-release so RC tags are visible on the Releases
      # page (previously only release-stable.yaml created releases; RC releases
      # had to be created by hand — v0.3.0-rc.1 gap).
      - name: Create GitHub pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: KubeSwift ${{ github.ref_name }}
          prerelease: true
          generate_release_notes: true
          body: |
            Release candidate — see the matching CHANGELOG.md section for
            details and Known Limitations.

            ## Install

            ```bash
            helm install kubeswift ${{ env.CHART_OCI_INSTALL }} --version ${{ steps.version.outputs.version }} -n kubeswift-system --create-namespace
            ```

            ## Images

            - `ghcr.io/projectbeskar/kubeswift/controller-manager:${{ steps.version.outputs.tag }}`
            - `ghcr.io/projectbeskar/kubeswift/swiftletd:${{ steps.version.outputs.tag }}`
            - `ghcr.io/projectbeskar/kubeswift/gpu-discovery:${{ steps.version.outputs.tag }}`
            - `ghcr.io/projectbeskar/kubeswift/snapshot-s3:${{ steps.version.outputs.tag }}`
            - `ghcr.io/projectbeskar/kubeswift/migration-stunnel:${{ steps.version.outputs.tag }}`

            ## Supply chain

            Images and the chart are cosign-signed (keyless, GitHub OIDC) and carry
            SLSA build provenance + SPDX SBOM attestations (BuildKit, in-registry).

            ```bash
            cosign verify ghcr.io/projectbeskar/kubeswift/controller-manager:${{ steps.version.outputs.tag }} \
              --certificate-identity-regexp 'https://github.com/projectbeskar/kubeswift/.github/workflows/release-(stable|rc).yaml@.*' \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com
            ```
