name: Release RC

on:
  push:
    tags:
      - 'v*.*.*-rc.*'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/projectbeskar/kubeswift
  CHART_OCI_PUSH: oci://ghcr.io/projectbeskar/charts
  CHART_OCI_INSTALL: oci://ghcr.io/projectbeskar/charts/kubeswift

jobs:
  build-and-push:
    name: Build and push images + chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set version from tag
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "git_commit=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push controller-manager
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./images/controller-manager/Containerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/controller-manager:${{ steps.version.outputs.tag }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            GIT_COMMIT=${{ steps.version.outputs.git_commit }}
            BUILD_DATE=${{ steps.version.outputs.build_date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push swiftletd
        uses: docker/build-push-action@v6
        with:
          context: ./rust
          file: ./images/swiftletd/Containerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/swiftletd:${{ steps.version.outputs.tag }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            GIT_COMMIT=${{ steps.version.outputs.git_commit }}
            BUILD_DATE=${{ steps.version.outputs.build_date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.0

      - name: Configure Helm for OCI
        run: helm registry login ${{ env.REGISTRY }} -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}

      - name: Package and push chart
        run: |
          helm package charts/kubeswift --version ${{ steps.version.outputs.version }} --app-version ${{ steps.version.outputs.version }}
          helm push kubeswift-${{ steps.version.outputs.version }}.tgz ${{ env.CHART_OCI_PUSH }}
