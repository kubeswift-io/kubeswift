name: Release Stable

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write
  id-token: write   # keyless cosign signing (Sigstore OIDC)

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/kubeswift-io/kubeswift
  CHART_OCI_PUSH: oci://ghcr.io/kubeswift-io/charts
  CHART_OCI_INSTALL: oci://ghcr.io/kubeswift-io/charts/kubeswift

jobs:
  build-and-push:
    if: "!contains(github.ref_name, '-rc')"
    name: Build and push images + chart
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set version from tag
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "git_commit=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push controller-manager
        id: build-controller-manager
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./images/controller-manager/Containerfile
          push: true
          # SLSA build provenance + SPDX SBOM, attached to the image in the
          # registry by BuildKit (no GitHub attestation store dependency -- that
          # requires Enterprise on private repos).
          provenance: mode=max
          sbom: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/controller-manager:${{ steps.version.outputs.tag }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            GIT_COMMIT=${{ steps.version.outputs.git_commit }}
            BUILD_DATE=${{ steps.version.outputs.build_date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push gpu-discovery
        id: build-gpu-discovery
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./images/gpu-discovery/Containerfile
          push: true
          # SLSA build provenance + SPDX SBOM, attached to the image in the
          # registry by BuildKit (no GitHub attestation store dependency -- that
          # requires Enterprise on private repos).
          provenance: mode=max
          sbom: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/gpu-discovery:${{ steps.version.outputs.tag }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            GIT_COMMIT=${{ steps.version.outputs.git_commit }}
            BUILD_DATE=${{ steps.version.outputs.build_date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


      - name: Build and push kubeswift-dra-driver
        id: build-dra-driver
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./images/kubeswift-dra-driver/Containerfile
          push: true
          provenance: mode=max
          sbom: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/kubeswift-dra-driver:${{ steps.version.outputs.tag }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            GIT_COMMIT=${{ steps.version.outputs.git_commit }}
            BUILD_DATE=${{ steps.version.outputs.build_date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push snapshot-s3
        id: build-snapshot-s3
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./images/snapshot-s3/Containerfile
          push: true
          # SLSA build provenance + SPDX SBOM, attached to the image in the
          # registry by BuildKit (no GitHub attestation store dependency -- that
          # requires Enterprise on private repos).
          provenance: mode=max
          sbom: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/snapshot-s3:${{ steps.version.outputs.tag }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            GIT_COMMIT=${{ steps.version.outputs.git_commit }}
            BUILD_DATE=${{ steps.version.outputs.build_date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push swiftletd
        id: build-swiftletd
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./images/swiftletd/Containerfile
          push: true
          # SLSA build provenance + SPDX SBOM, attached to the image in the
          # registry by BuildKit (no GitHub attestation store dependency -- that
          # requires Enterprise on private repos).
          provenance: mode=max
          sbom: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/swiftletd:${{ steps.version.outputs.tag }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            GIT_COMMIT=${{ steps.version.outputs.git_commit }}
            BUILD_DATE=${{ steps.version.outputs.build_date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push migration-stunnel
        id: build-migration-stunnel
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./images/migration-stunnel/Containerfile
          push: true
          # SLSA build provenance + SPDX SBOM, attached to the image in the
          # registry by BuildKit (no GitHub attestation store dependency -- that
          # requires Enterprise on private repos).
          provenance: mode=max
          sbom: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/migration-stunnel:${{ steps.version.outputs.tag }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            GIT_COMMIT=${{ steps.version.outputs.git_commit }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push kubeswift-gateway
        id: build-gateway
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./images/kubeswift-gateway/Containerfile
          push: true
          provenance: mode=max
          sbom: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/kubeswift-gateway:${{ steps.version.outputs.tag }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            GIT_COMMIT=${{ steps.version.outputs.git_commit }}
            BUILD_DATE=${{ steps.version.outputs.build_date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      # Keyless signing: the signing identity is THIS workflow run's GitHub
      # OIDC identity (repo + workflow path + tag ref); the signature and
      # certificate are stored alongside the image in GHCR and logged in the
      # Rekor transparency log. Verify with:
      #   cosign verify <image>@<digest> \
      #     --certificate-identity-regexp 'https://github.com/kubeswift-io/kubeswift/\.github/workflows/release-(stable|rc)\.yaml@.*' \
      #     --certificate-oidc-issuer https://token.actions.githubusercontent.com
      - name: Sign images (cosign keyless)
        env:
          COSIGN_YES: "true"
        run: |
          cosign sign "${{ env.IMAGE_PREFIX }}/controller-manager@${{ steps.build-controller-manager.outputs.digest }}"
          cosign sign "${{ env.IMAGE_PREFIX }}/gpu-discovery@${{ steps.build-gpu-discovery.outputs.digest }}"
          cosign sign "${{ env.IMAGE_PREFIX }}/snapshot-s3@${{ steps.build-snapshot-s3.outputs.digest }}"
          cosign sign "${{ env.IMAGE_PREFIX }}/kubeswift-dra-driver@${{ steps.build-dra-driver.outputs.digest }}"
          cosign sign "${{ env.IMAGE_PREFIX }}/swiftletd@${{ steps.build-swiftletd.outputs.digest }}"
          cosign sign "${{ env.IMAGE_PREFIX }}/migration-stunnel@${{ steps.build-migration-stunnel.outputs.digest }}"
          cosign sign "${{ env.IMAGE_PREFIX }}/kubeswift-gateway@${{ steps.build-gateway.outputs.digest }}"

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.0

      - name: Configure Helm for OCI
        run: helm registry login ${{ env.REGISTRY }} -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Generate and sync CRDs
        run: |
          go install sigs.k8s.io/controller-tools/cmd/controller-gen@v0.20.1
          export PATH="$(go env GOPATH)/bin:$PATH"
          make generate
          cp config/crd/bases/*.yaml charts/kubeswift/crds/

      - name: Package and push chart
        id: chart
        run: |
          helm package charts/kubeswift --version ${{ steps.version.outputs.version }} --app-version ${{ steps.version.outputs.version }}
          helm push kubeswift-${{ steps.version.outputs.version }}.tgz ${{ env.CHART_OCI_PUSH }} 2>&1 | tee chart-push.log
          DIGEST=$(grep -o 'sha256:[a-f0-9]*' chart-push.log | head -1)
          test -n "$DIGEST"   # fail loud if helm stops printing the digest
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      - name: Sign chart (cosign keyless)
        env:
          COSIGN_YES: "true"
        run: cosign sign "ghcr.io/kubeswift-io/charts/kubeswift@${{ steps.chart.outputs.digest }}"

  github-release:
    if: "!contains(github.ref_name, '-rc')"
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Build swiftctl
        run: |
          VERSION="${{ needs.build-and-push.outputs.version }}"
          GIT_COMMIT="$(git rev-parse HEAD)"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          LDFLAGS="-X github.com/kubeswift-io/kubeswift/internal/version.Version=${VERSION} -X github.com/kubeswift-io/kubeswift/internal/version.GitCommit=${GIT_COMMIT} -X github.com/kubeswift-io/kubeswift/internal/version.BuildDate=${BUILD_DATE}"
          mkdir -p dist
          GOOS=linux GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/swiftctl-linux-amd64 ./cmd/swiftctl
          GOOS=darwin GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/swiftctl-darwin-amd64 ./cmd/swiftctl
          GOOS=darwin GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o dist/swiftctl-darwin-arm64 ./cmd/swiftctl

      - name: Checksums
        run: cd dist && sha256sum swiftctl-* > SHA256SUMS

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      # Keyless blob signing of the checksums file. Verifying SHA256SUMS via
      # the .sig/.pem pair transitively authenticates every binary it lists.
      - name: Sign checksums (cosign keyless)
        env:
          COSIGN_YES: "true"
        run: |
          cosign sign-blob \
            --output-signature dist/SHA256SUMS.sig \
            --output-certificate dist/SHA256SUMS.pem \
            dist/SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: KubeSwift ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*
          body: |
            ## Install

            ```bash
            helm install kubeswift ${{ env.CHART_OCI_INSTALL }} --version ${{ needs.build-and-push.outputs.version }} -n kubeswift-system --create-namespace
            ```

            ## Images

            - `ghcr.io/kubeswift-io/kubeswift/controller-manager:${{ needs.build-and-push.outputs.tag }}`
            - `ghcr.io/kubeswift-io/kubeswift/swiftletd:${{ needs.build-and-push.outputs.tag }}`
            - `ghcr.io/kubeswift-io/kubeswift/gpu-discovery:${{ needs.build-and-push.outputs.tag }}`
            - `ghcr.io/kubeswift-io/kubeswift/migration-stunnel:${{ needs.build-and-push.outputs.tag }}`

            ## swiftctl

            Download the `swiftctl` binary for your platform from the Assets below.

            ## Supply chain

            Images and the Helm chart are **cosign-signed** (keyless, GitHub OIDC)
            and carry **SLSA build provenance + SPDX SBOM** attestations attached
            in-registry by BuildKit. Verify an image:

            ```bash
            cosign verify ghcr.io/kubeswift-io/kubeswift/controller-manager:${{ github.ref_name }} \
              --certificate-identity-regexp 'https://github.com/kubeswift-io/kubeswift/.github/workflows/release-(stable|rc).yaml@.*' \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com
            docker buildx imagetools inspect ghcr.io/kubeswift-io/kubeswift/controller-manager:${{ github.ref_name }} --format '{{ json .Provenance }}'
            ```

            Verify the binaries (SHA256SUMS is cosign-signed; the checksums then cover each binary):

            ```bash
            cosign verify-blob --signature SHA256SUMS.sig --certificate SHA256SUMS.pem \
              --certificate-identity-regexp 'https://github.com/kubeswift-io/kubeswift/.github/workflows/release-stable.yaml@.*' \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com SHA256SUMS
            sha256sum -c SHA256SUMS
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
