name: Release Dev

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/projectbeskar/kubeswift
  # Push: parent repo only (Helm appends chart name)
  CHART_OCI_PUSH: oci://ghcr.io/projectbeskar/charts
  # Install: full reference
  CHART_OCI_INSTALL: oci://ghcr.io/projectbeskar/charts/kubeswift

jobs:
  build-and-push:
    name: Build and push images + chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set version
        id: version
        run: |
          SHORT=$(echo ${{ github.sha }} | cut -c1-7)
          # SemVer 2.0.0 §9 forbids leading zeroes in numeric pre-release
          # identifiers; Helm enforces strictly. A 7-char hex hash is
          # rejected ONLY when it is all-digits AND starts with 0 (e.g.,
          # "0781498" — PR #49's merge SHA). Probability ~0.4% per
          # commit. For the rejected case, prepend "g" (git describe
          # convention) to make the segment alphanumeric. For all
          # other ~99.6% of commits, preserve the documented format
          # `0.0.0-dev.<shortsha>` so consumers (Makefile,
          # hack/chart-version.sh, hack/version.sh, docs/deploy.md,
          # docs/releases.md, docs/install/helm-oci.md, operator
          # deploy scripts) continue to compute the right version
          # without conditional logic of their own.
          if [[ "$SHORT" =~ ^0[0-9]{6}$ ]]; then
            CHART_VERSION="0.0.0-dev.g${SHORT}"
          else
            CHART_VERSION="0.0.0-dev.${SHORT}"
          fi
          echo "version=$CHART_VERSION" >> $GITHUB_OUTPUT
          echo "image_tag=sha-${SHORT}" >> $GITHUB_OUTPUT
          echo "git_commit=${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push controller-manager
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./images/controller-manager/Containerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/controller-manager:${{ steps.version.outputs.image_tag }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            GIT_COMMIT=${{ steps.version.outputs.git_commit }}
            BUILD_DATE=${{ steps.version.outputs.build_date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push gpu-discovery
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./images/gpu-discovery/Containerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/gpu-discovery:${{ steps.version.outputs.image_tag }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            GIT_COMMIT=${{ steps.version.outputs.git_commit }}
            BUILD_DATE=${{ steps.version.outputs.build_date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


      - name: Build and push kubeswift-dra-driver
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./images/kubeswift-dra-driver/Containerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/kubeswift-dra-driver:${{ steps.version.outputs.image_tag }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            GIT_COMMIT=${{ steps.version.outputs.git_commit }}
            BUILD_DATE=${{ steps.version.outputs.build_date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push snapshot-s3
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./images/snapshot-s3/Containerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/snapshot-s3:${{ steps.version.outputs.image_tag }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            GIT_COMMIT=${{ steps.version.outputs.git_commit }}
            BUILD_DATE=${{ steps.version.outputs.build_date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push swiftletd
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./images/swiftletd/Containerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/swiftletd:${{ steps.version.outputs.image_tag }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            GIT_COMMIT=${{ steps.version.outputs.git_commit }}
            BUILD_DATE=${{ steps.version.outputs.build_date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push migration-stunnel
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./images/migration-stunnel/Containerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/migration-stunnel:${{ steps.version.outputs.image_tag }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            GIT_COMMIT=${{ steps.version.outputs.git_commit }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.0

      - name: Configure Helm for OCI
        run: helm registry login ${{ env.REGISTRY }} -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}

      - name: Package and push chart
        run: |
          CHART_VERSION="${{ steps.version.outputs.version }}"
          helm package charts/kubeswift --version "$CHART_VERSION" --app-version "$CHART_VERSION"
          helm push kubeswift-$CHART_VERSION.tgz ${{ env.CHART_OCI_PUSH }}
